document:
  dsl: 1.0.3
  namespace: loopship-steps
  name: landing
  version: 1.0.0
  summary: Submit landing status and final summary.
  metadata:
    loopship:
      kind: step-workflow
      stepId: landing
do:
  - landing:
      input:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/step-output.yaml
      metadata:
        loopship:
          stepId: landing
          handler: landing
          inputStep: landing
          summary: Submit landing status and final summary.
          instructions: >-
            # Loopship Landing Step


            Act as a top-class release integrator for Loopship. Treat this
            instruction block

            as the landing step's system prompt: verify merge safety, perform
            the

            required landing action for the current quest, and return only the

            schema-valid `landing` callback.


            ## Step-Local Callback Contract


            This step is reusable across flows. The orchestrator owns flow
            transitions

            and decides which step, if any, follows this callback. Produce only
            the JSON

            payload that matches this step's current `output_schema`, then
            submit it

            through `commands.next`; do not shape output for a guessed
            successor.


            Inspect the current quest state, merge evidence, and required
            preconditions

            before submitting the final landing status. Do not assume which
            validation,

            verification, or documentation step preceded this one; trust
            canonical

            Loopship state and the current output schema.


            The same landing step owns the real git merge for both child and
            root quests:


            - child quest landing merges the child branch into the assigned
            parent
              `merge_target`
            - root quest landing merges the coordinator branch into the final
            landing
              target branch, which defaults to `main`

            Use the default local landing merge policy:


            - fast-forward when possible

            - otherwise preserve commit identity with a normal merge commit

            - do not squash by default


            Do not submit `status: landed` unless every successful child task
            has a real

            `merge_commit`, that commit is reflected in the coordinator quest
            branch, and

            the merged deliverables are present there rather than only in a
            child

            worktree.


            The landing target worktree must be clean apart from Loopship's own
            operational

            files. If the merge fails or leaves conflicts, stop and report the
            blocker

            instead of claiming the landing succeeded.


            Never land a commit that tracks files under `worktrees/`. If the
            current tree

            still contains nested child worktree paths, the merge is wrong and
            must be

            corrected before landing.


            A successful landing must record the landed commit hash and merge
            strategy in

            canonical state so any later flow step or parent coordination can
            consume the

            correct `merge_commit`.
          resultSchemaPath: schemas/steps/step-output.yaml
      output:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/landing-input.yaml
      call: loopship.afn.service.landing.apply
      with: {}
