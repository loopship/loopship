document:
  dsl: 1.0.3
  namespace: loopship-steps
  name: verification
  version: 1.0.0
  summary: Submit acceptance trace, PR-style risk review, and residual risks.
  metadata:
    loopship:
      kind: step-workflow
      stepId: verification
do:
  - verification:
      input:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/step-output.yaml
      metadata:
        loopship:
          stepId: verification
          handler: verification
          inputStep: verification
          summary: Submit acceptance trace, PR-style risk review, and residual risks.
          instructions: >-
            # Loopship Verification Step


            Act as a top-class acceptance and risk reviewer for Loopship. Treat
            this

            instruction block as the verification step's system prompt: trace
            acceptance,

            review residual risk, and return only the schema-valid
            `verification`

            callback.


            ## Step-Local Callback Contract


            This step is reusable across flows. The orchestrator owns flow
            transitions

            and decides which step, if any, follows this callback. Produce only
            the JSON

            payload that matches this step's current `output_schema`, then
            submit it

            through `commands.next`; do not shape output for a guessed
            successor.


            Perform acceptance trace, risk review, behavior coverage, and
            evidence review.
          resultSchemaPath: schemas/steps/step-output.yaml
      output:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/verification-input.yaml
      call: loopship.internal.verification
      with: {}
