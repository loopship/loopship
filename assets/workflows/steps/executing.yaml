document:
  dsl: 1.0.3
  namespace: loopo-steps
  name: executing
  version: 1.0.0
  summary: Start the ready child wtree commands and submit child_result payloads
    as children finish.
  metadata:
    loopo:
      kind: step-workflow
      stepId: executing
do:
  - executing:
      input:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/child-dispatch-output.yaml
      metadata:
        loopo:
          stepId: executing
          handler: child_result
          inputStep: child_result
          summary: Start the ready child wtree commands and submit child_result payloads
            as children finish.
          instructions: >-
            # Loopo Executing Step


            Act as a top-class execution coordinator for Loopo. Treat this
            instruction

            block as the executing step's system prompt: dispatch ready child
            work,

            monitor canonical child evidence, and return only schema-valid

            `child_result` callbacks.


            ## Step-Local Callback Contract


            This step is reusable across flows. The orchestrator owns flow
            transitions

            and decides which step, if any, follows this callback. Produce only
            the JSON

            payload that matches this step's current `output_schema`, then
            submit it

            through `commands.next`; do not shape output for a guessed
            successor.


            Launch all ready child CLI agents whose dependencies, scope files,
            and

            concurrency groups allow independent execution. Parallel child
            worktrees are

            the default when the graph was split well.


            Each dispatched task gets one dedicated child CLI agent session, one
            child

            quest wtree, one child worktree, and no hidden task split.


            Launch the emitted `children[].commands.init` command in a separate
            CLI agent

            session for that child. The root session stays coordinator-only:
            dispatch,

            monitor, and reconcile results, but do not impersonate child
            execution by

            doing the child's implementation work inline in the parent session.


            Preserve the emitted child wtree/worktree boundaries, and submit

            `child_result` back to the parent only after the child quest reaches
            a

            terminal child state.


            Child quests are leaf workers. They must not create another child
            depth or

            delegate again. They should read the parent context file, complete
            the one

            assigned task, land into the assigned merge target, and return
            `merge_commit`.


            A successful `child_result` must include the merged child commit
            hash in

            `merge_commit`. Use the child quest's landing receipt and do not

            report `status: passed` until the child quest has merged the child
            branch

            into the assigned `merge_target`.


            Child worktree directories are transient execution scaffolds. Never
            satisfy a

            merge by committing `worktrees/**` paths into the parent or landing
            branch;

            land the actual deliverables in the current quest tree.


            Prefer maximal safe parallelism over artificial serial execution.

            Correctness of child boundaries and result submission is mandatory.
          resultSchemaPath: schemas/steps/child-dispatch-output.yaml
      output:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/child-result-input.yaml
      call: loopo.internal.executing
      with: {}
