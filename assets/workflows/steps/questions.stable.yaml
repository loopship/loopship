document:
  dsl: 1.0.3
  namespace: loopship-steps
  name: questions
  version: 1.0.0
  summary: Submit grouped user answers for the current clarification round.
  metadata:
    catalog:
      tags:
        - loopship
        - step
        - questions
input:
  schema:
    format: json
    document:
      $ref: ../../../schemas/steps/step-output.yaml
output:
  schema:
    format: json
    document:
      type: object
      additionalProperties: true
  as: ${state.steps.questions.action}
do:
  - questions:
      input:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/step-output.yaml
        from: ${inputs}
      metadata:
        description: >-
          # Loopship Questions Step


          Act as a top-class clarification recorder for Loopship. Treat this instruction

          block as the questions step's system prompt: capture human-provided answers

          exactly, preserve identifiers, and return only the schema-valid `questions`

          callback.


          ## Step-Local Callback Contract


          This step is reusable across flows. The orchestrator owns flow transitions

          and decides which step, if any, follows this callback. Produce only the JSON

          payload that matches this step's current `output_schema`, then submit it

          through `commands.next`; do not shape output for a guessed successor.


          Record answers from the most recent grouped clarification round. Preserve the

          original question ids, carry forward any previously recorded explicit

          defaults, and submit answers through the emitted `commands.next` with the `questions` step
          schema. Do not auto-answer unresolved

          questions; wait for human-provided answers before submitting this callback.
        inference: handoff
        validation:
          post:
            kind: static
            ok: true
            evidence:
              source: loopship.workflow.yaml
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: The Loopship Fastflow-native workflow step is structurally valid.
              check:
                script:
                  kind: js
                  code: |
                    return { ok: true, evidence: { source: 'loopship.workflow.yaml' } };
      output:
        schema:
          format: json
          document:
            type: object
            additionalProperties: true
        as: ${action}
      call: fastflow.afn.core.request.input
      with:
        body:
          instruction: >-
            # Loopship Questions Step


            Act as a top-class clarification recorder for Loopship. Treat this instruction

            block as the questions step's system prompt: capture human-provided answers

            exactly, preserve identifiers, and return only the schema-valid `questions`

            callback.


            ## Step-Local Callback Contract


            This step is reusable across flows. The orchestrator owns flow transitions

            and decides which step, if any, follows this callback. Produce only the JSON

            payload that matches this step's current `output_schema`, then submit it

            through `commands.next`; do not shape output for a guessed successor.


            Record answers from the most recent grouped clarification round. Preserve the

            original question ids, carry forward any previously recorded explicit

            defaults, and submit answers through the emitted `commands.next` with the `questions`
            step schema. Do not auto-answer unresolved

            questions; wait for human-provided answers before submitting this callback.
          request:
            schema:
              type: object
              additionalProperties: true
              properties:
                step:
                  type: object
                  additionalProperties: true
                inputs:
                  $ref: ../../../schemas/steps/step-output.yaml
                state:
                  type: object
                  additionalProperties: true
                args:
                  type: object
                  additionalProperties: true
              required:
                - step
                - inputs
            build:
              kind: js
              using:
                - inputs
                - state
                - args
              code: >-
                return {
                  step: {"id":"questions","handler":"questions","summary":"Submit grouped user answers for the current clarification round.","input_step":"questions","result_schema":"schemas/steps/step-output.yaml"},
                  inputs,
                  state,
                  args
                };
          answer:
            schema:
              $ref: ../../../schemas/steps/questions-input.yaml
