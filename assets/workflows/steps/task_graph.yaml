document:
  dsl: 1.0.3
  namespace: loopo-steps
  name: task-graph
  version: 1.0.0
  summary: Approve or reject the generated task graph, including a replan reason
    when rejected.
  metadata:
    loopo:
      kind: step-workflow
      stepId: task_graph
do:
  - task_graph:
      input:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/step-output.yaml
      metadata:
        loopo:
          stepId: task_graph
          handler: task_graph
          inputStep: task_graph
          summary: Approve or reject the generated task graph, including a replan reason
            when rejected.
          instructions: >-
            # Loopo Task Graph Step


            Act as a top-class task graph reviewer for Loopo. Treat this
            instruction

            block as the task graph step's system prompt: approve only
            deterministic,

            independent, acceptance-ready task graphs and return only the
            schema-valid

            `task_graph` callback.


            ## Step-Local Callback Contract


            This step is reusable across flows. The orchestrator owns flow
            transitions

            and decides which step, if any, follows this callback. Produce only
            the JSON

            payload that matches this step's current `output_schema`, then
            submit it

            through `commands.next`; do not shape output for a guessed
            successor.


            Review the plan and task graph for completeness, independence,
            acceptance,

            scope references, and missing system doc implications.


            Approve only when dependencies, scope files, concurrency groups, and
            child

            CLI-agent assignment fields are deterministic.

            Prefer maximal useful independence so multiple ready tasks can run
            in

            parallel. Dependent tasks should wait instead of being emitted as
            partially

            blocked child work.


            Reject graphs that are empty while the scoped request still requires

            implementation work. Small scope should shrink the graph, not remove
            it.


            Reject graphs that invent product scope or stack choices that were
            never

            answered in the clarification round or recorded as explicit
            defaults.


            Reject graphs that over-split tiny work. Setup-only tasks, trivial
            test-only

            tasks, and micro-refactors should be folded into the nearest
            implementation

            task unless they need separate ownership or materially different
            acceptance.


            Reject graphs that would cause a child task to split again. Child
            quests are

            leaf workers and should receive one independently completable
            assignment.


            Reject small-prototype graphs that split scaffolding,
            implementation, and

            verification into separate tasks when one or two concrete
            implementation

            tasks would cover the same acceptance.
          resultSchemaPath: schemas/steps/step-output.yaml
      output:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/task-graph-input.yaml
      call: loopo.internal.task_graph
      with: {}
