edition = "2024";

package loopship.v1;

import "cmdproto/v1/options.proto";
import "google/protobuf/struct.proto";

service LoopshipService {
  rpc Init(InitRequest) returns (InitResponse) {
    option (cmdproto.v1.command) = {
      path: "init"
      summary: "Start or resume a Loopship quest from an objective."
      example: {
        command: "init loopship:build-the-app --repo . --runtime codex --flow swe --wtree build-the-app"
        description: "Start routing for a Loopship request."
        request_json: "{\"request\":\"loopship:build-the-app\",\"repo\":\".\",\"runtime\":\"codex\",\"flow\":\"swe\",\"wtree\":\"build-the-app\"}"
      }
    };
  }

  rpc QuestNext(QuestNextRequest) returns (QuestNextResponse) {
    option (cmdproto.v1.command) = {
      path: "quest next"
      summary: "Advance a quest with the next lifecycle payload."
      example: {
        command: "quest next --wtree build-the-app --repo . --json {\"step\":\"<current_step>\",\"<output_schema_fields>\":\"...\"}"
        description: "Send the payload required by the current response's output_schema; the response returns the next step instructions, output_schema, and commands.next."
        request_json: "{\"wtree\":\"build-the-app\",\"repo\":\".\",\"payload\":{\"step\":\"<current_step>\",\"<output_schema_fields>\":\"...\"}}"
      }
    };
  }

  rpc Hook(HookRequest) returns (HookResponse) {
    option (cmdproto.v1.command) = {
      path: "hook"
      summary: "Handle a runtime hook event payload."
      example: {
        command: "hook --runtime codex --json {\"event\":\"Stop\",\"stop_reason\":\"none\"}"
        description: "Handle a runtime hook event."
        request_json: "{\"runtime\":\"codex\",\"payload\":{\"event\":\"Stop\",\"stop_reason\":\"none\"}}"
      }
    };
  }

  rpc Doctor(DoctorRequest) returns (DoctorResponse) {
    option (cmdproto.v1.command) = {
      path: "doctor"
      summary: "Inspect or repair Loopship runtime scaffolding."
      example: {
        command: "doctor --repo . --runtime all --fix"
        description: "Repair Loopship runtime scaffolding in a repo."
        request_json: "{\"repo\":\".\",\"runtime\":\"all\",\"fix\":true}"
      }
    };
  }

  rpc Handbook(HandbookRequest) returns (HandbookResponse) {
    option (cmdproto.v1.command) = {
      path: "handbook"
      summary: "Render the standalone Loopship handbook from canonical YAML."
      example: {
        command: "handbook --repo ."
        description: "Generate handbook Markdown in a recoverable system temp path and return its file URL."
        request_json: "{\"repo\":\".\"}"
      }
    };
  }

  rpc SimInit(SimInitRequest) returns (SimInitResponse) {
    option (cmdproto.v1.command) = {
      path: "sim init"
      summary: "Start a simulated Loopship quest from an objective."
      example: {
        command: "sim init loopship:build-the-app --repo /tmp/loopship-sim --runtime codex --flow swe --wtree build-the-app"
        description: "Start a guided simulated Loopship lifecycle run."
        request_json: "{\"repo\":\"/tmp/loopship-sim\",\"runtime\":\"codex\",\"request\":\"loopship:build-the-app\",\"flow\":\"swe\",\"wtree\":\"build-the-app\"}"
      }
    };
  }

  rpc SimQuestNext(SimQuestNextRequest) returns (SimQuestNextResponse) {
    option (cmdproto.v1.command) = {
      path: "sim quest next"
      summary: "Advance a simulated quest with the next lifecycle payload."
      example: {
        command: "sim quest next --wtree build-the-app --repo /tmp/loopship-sim --json {\"step\":\"<current_step>\",\"<output_schema_fields>\":\"...\"}"
        description: "Send the simulated payload required by the current response's output_schema; the response pauses at the next selected-flow step."
        request_json: "{\"wtree\":\"build-the-app\",\"repo\":\"/tmp/loopship-sim\",\"payload\":{\"step\":\"<current_step>\",\"<output_schema_fields>\":\"...\"}}"
      }
    };
  }

  rpc SimHook(SimHookRequest) returns (SimHookResponse) {
    option (cmdproto.v1.command) = {
      path: "sim hook"
      summary: "Handle a simulated runtime hook event payload."
      example: {
        command: "sim hook --repo /tmp/loopship-sim --runtime codex --wtree build-the-app --json {\"event\":\"Stop\",\"stop_reason\":\"none\"}"
        description: "Exercise runtime hook passthrough behavior in simulation mode."
        request_json: "{\"repo\":\"/tmp/loopship-sim\",\"runtime\":\"codex\",\"wtree\":\"build-the-app\",\"payload\":{\"event\":\"Stop\",\"stop_reason\":\"none\"}}"
      }
    };
  }
}

message InitRequest {
  string request = 1 [
    (cmdproto.v1.param) = {
      positional: { index: 1 }
      help: "Loopship objective text, usually prefixed with loopship:."
    }
  ];

  string repo = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root used for init."
    }
  ];

  string runtime = 3 [
    (cmdproto.v1.param) = {
      flag: { long: "runtime" }
      help: "Runtime name: codex, gemini, copilot, or all."
    }
  ];

  string flow = 4 [
    (cmdproto.v1.param) = {
      flag: { long: "flow" }
      help: "Flow id for init, default swe."
    }
  ];

  string wtree = 5 [
    (cmdproto.v1.param) = {
      flag: { long: "wtree" }
      help: "Explicit base worktree name."
    }
  ];
}

message QuestNextRequest {
  string wtree = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "wtree" }
      help: "Base worktree name to advance."
    }
  ];

  string repo = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root for quest resolution."
    }
  ];

  google.protobuf.Struct payload = 3 [
    (cmdproto.v1.param) = {
      json: { enabled: true }
      help: "Quest output payload matching the current output_schema."
    },
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"$ref\":\"schemas/steps/next-input.yaml\"}"
    }
  ];
}

message HookRequest {
  string runtime = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "runtime" }
      help: "Runtime lane for hook handling."
    }
  ];

  string repo = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root for hook handling."
    }
  ];

  string wtree = 3 [
    (cmdproto.v1.param) = {
      flag: { long: "wtree" }
      help: "Optional explicit base worktree name."
    }
  ];

  google.protobuf.Struct payload = 4 [
    (cmdproto.v1.param) = {
      json: { enabled: true }
      help: "Runtime hook payload object."
    },
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"additionalProperties\":true}"
    }
  ];
}

message DoctorRequest {
  string repo = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root to inspect or repair."
    }
  ];

  string runtime = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "runtime" }
      help: "Runtime name: codex, gemini, copilot, or all."
    }
  ];

  bool fix = 3 [
    (cmdproto.v1.param) = {
      flag: { long: "fix" }
      help: "Apply doctor repairs instead of reporting only."
    }
  ];
}

message HandbookRequest {
  string repo = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root containing canonical .loopship system files."
    }
  ];

  bool raw = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "raw" }
      help: "Return the rendered Markdown in the machine response instead of writing a temp file."
    }
  ];
}

message SimInitRequest {
  string request = 1 [
    (cmdproto.v1.param) = {
      positional: { index: 1 }
      help: "Guided simulation request text."
    }
  ];

  string repo = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root for simulation."
    }
  ];

  string runtime = 3 [
    (cmdproto.v1.param) = {
      flag: { long: "runtime" }
      help: "Simulation runtime lane."
    }
  ];

  string flow = 4 [
    (cmdproto.v1.param) = {
      flag: { long: "flow" }
      help: "Flow id for guided simulation start."
    }
  ];

  string wtree = 5 [
    (cmdproto.v1.param) = {
      flag: { long: "wtree" }
      help: "Explicit simulated base worktree name."
    }
  ];
}

message SimQuestNextRequest {
  string wtree = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "wtree" }
      help: "Simulated base worktree name to advance."
    }
  ];

  string repo = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root for simulation."
    }
  ];

  google.protobuf.Struct payload = 3 [
    (cmdproto.v1.param) = {
      json: { enabled: true }
      help: "Simulated quest output payload matching the current output_schema."
    },
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"$ref\":\"schemas/steps/next-input.yaml\"}"
    }
  ];

  bool full = 4 [
    (cmdproto.v1.param) = {
      flag: { long: "full" }
      help: "Return full simulated step output."
    }
  ];
}

message SimHookRequest {
  string runtime = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "runtime" }
      help: "Simulation runtime lane."
    }
  ];

  string repo = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root for simulation."
    }
  ];

  string wtree = 3 [
    (cmdproto.v1.param) = {
      flag: { long: "wtree" }
      help: "Optional explicit simulated base worktree name."
    }
  ];

  google.protobuf.Struct payload = 4 [
    (cmdproto.v1.param) = {
      json: { enabled: true }
      help: "Simulation hook payload object."
    },
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"additionalProperties\":true}"
    }
  ];
}

message InitResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"anyOf\":[{\"$ref\":\"schemas/steps/init-output.yaml\"},{\"type\":\"object\",\"required\":[\"mode\",\"files\"],\"properties\":{\"mode\":{\"type\":\"string\"},\"repo\":{\"type\":\"string\"},\"files\":{\"type\":\"array\",\"items\":{\"type\":\"string\"}}},\"additionalProperties\":true}]}"
    }
  ];
}

message QuestNextResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"anyOf\":[{\"$ref\":\"schemas/steps/step-output.yaml\"},{\"$ref\":\"schemas/steps/error-output.yaml\"},{\"$ref\":\"schemas/steps/lock-error.yaml\"}]}"
    }
  ];
}

message HookResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"anyOf\":[{\"$ref\":\"schemas/steps/hook-output.yaml\"},{\"type\":\"object\",\"maxProperties\":0}]}"
    }
  ];
}

message DoctorResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"required\":[\"status\"],\"properties\":{\"status\":{\"type\":\"string\"},\"repo\":{\"type\":\"string\"},\"items\":{\"type\":\"array\",\"items\":{\"type\":\"string\"}},\"rerun_with_fix\":{\"type\":\"boolean\"}},\"additionalProperties\":true}"
    }
  ];
}

message HandbookResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"oneOf\":[{\"required\":[\"path\",\"file_url\"],\"properties\":{\"path\":{\"type\":\"string\"},\"file_url\":{\"type\":\"string\"}},\"additionalProperties\":false},{\"required\":[\"markdown\"],\"properties\":{\"markdown\":{\"type\":\"string\"}},\"additionalProperties\":false}]}"
    }
  ];
}

message SimInitResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"additionalProperties\":true}"
    }
  ];
}

message SimQuestNextResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"additionalProperties\":true}"
    }
  ];
}

message SimHookResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"additionalProperties\":true}"
    }
  ];
}
