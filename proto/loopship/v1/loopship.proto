edition = "2024";

package loopship.v1;

import "cmdproto/v1/options.proto";
import "google/protobuf/struct.proto";

service LoopshipService {
  rpc Init(InitRequest) returns (InitResponse) {
    option (cmdproto.v1.command) = {
      path: "init"
      summary: "Start a Loopship quest from an objective."
      example: {
        command: "init loopship:build-the-app --repo . --runtime codex --flow swe --wtree build-the-app"
        description: "Start routing for a Loopship request."
        request_json: "{\"request\":\"loopship:build-the-app\",\"repo\":\".\",\"runtime\":\"codex\",\"flow\":\"swe\",\"wtree\":\"build-the-app\"}"
      }
    };
  }

  rpc Resume(ResumeRequest) returns (ResumeResponse) {
    option (cmdproto.v1.command) = {
      path: "resume"
      summary: "Resume a handoff or recover an interrupted quest from canonical state."
      example: {
        command: "resume --repo . --wtree build-the-app"
        description: "Recover an interrupted inline quest from its canonical worktree state."
        request_json: "{\"repo\":\".\",\"wtree\":\"build-the-app\"}"
      }
    };
  }

  rpc Hook(HookRequest) returns (HookResponse) {
    option (cmdproto.v1.command) = {
      path: "hook"
      summary: "Handle a runtime hook event payload."
      example: {
        command: "hook --runtime codex --json {\"event\":\"Stop\",\"stop_reason\":\"none\"}"
        description: "Handle a runtime hook event."
        request_json: "{\"runtime\":\"codex\",\"payload\":{\"event\":\"Stop\",\"stop_reason\":\"none\"}}"
      }
    };
  }

  rpc Doctor(DoctorRequest) returns (DoctorResponse) {
    option (cmdproto.v1.command) = {
      path: "doctor"
      summary: "Inspect or repair Loopship runtime scaffolding."
      example: {
        command: "doctor --repo . --runtime all --fix"
        description: "Repair Loopship runtime scaffolding in a repo."
        request_json: "{\"repo\":\".\",\"runtime\":\"all\",\"fix\":true}"
      }
    };
  }

  rpc Handbook(HandbookRequest) returns (HandbookResponse) {
    option (cmdproto.v1.command) = {
      path: "handbook"
      summary: "Render the standalone Loopship handbook from canonical YAML."
      example: {
        command: "handbook --repo ."
        description: "Generate handbook Markdown in a recoverable system temp path and return its file URL."
        request_json: "{\"repo\":\".\"}"
      }
    };
  }
}

message InitRequest {
  string request = 1 [
    (cmdproto.v1.param) = {
      positional: { index: 1 }
      help: "Loopship objective text, usually prefixed with loopship:."
    }
  ];

  string repo = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root used for init."
    }
  ];

  string runtime = 3 [
    (cmdproto.v1.param) = {
      flag: { long: "runtime" }
      help: "Runtime name: codex, gemini, copilot, or all."
    }
  ];

  string flow = 4 [
    (cmdproto.v1.param) = {
      flag: { long: "flow" }
      help: "Flow id for init, default swe."
    }
  ];

  string wtree = 5 [
    (cmdproto.v1.param) = {
      flag: { long: "wtree" }
      help: "Explicit base worktree name."
    }
  ];

  string source_branch = 6 [(cmdproto.v1.param) = { flag: { long: "source-branch" } help: "Coordinator source branch." }];
  string parent_wtree = 7 [(cmdproto.v1.param) = { flag: { long: "parent-wtree" } help: "Parent coordinator worktree." }];
  string parent_task_id = 8 [(cmdproto.v1.param) = { flag: { long: "parent-task-id" } help: "Parent task id." }];
  string parent_context_ref = 9 [(cmdproto.v1.param) = { flag: { long: "parent-context-ref" } help: "Parent runtime task state path." }];
  string target_branch = 10 [(cmdproto.v1.param) = { flag: { long: "target-branch" } help: "Landing target branch." }];
  string target_worktree = 11 [(cmdproto.v1.param) = { flag: { long: "target-worktree" } help: "Landing target worktree." }];
  string skill_home = 12 [(cmdproto.v1.param) = { flag: { long: "skill-home" } help: "Optional Loopship skill installation root." }];
}

message HookRequest {
  string runtime = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "runtime" }
      help: "Runtime lane for hook handling."
    }
  ];

  string repo = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root for hook handling."
    }
  ];

  string wtree = 3 [
    (cmdproto.v1.param) = {
      flag: { long: "wtree" }
      help: "Optional explicit base worktree name."
    }
  ];

  google.protobuf.Struct payload = 4 [
    (cmdproto.v1.param) = {
      json: { enabled: true }
      help: "Runtime hook payload object."
    },
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"additionalProperties\":true}"
    }
  ];
}

message ResumeRequest {
  string repo = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root containing the quest worktree."
    }
  ];

  string wtree = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "wtree" }
      help: "Interrupted quest worktree to recover when no handoff payload is supplied."
    }
  ];

  google.protobuf.Struct payload = 3 [
    (cmdproto.v1.param) = {
      json: { enabled: true }
      help: "Optional native Fastflow handoff resume payload."
    },
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"additionalProperties\":true}"
    }
  ];
}

message DoctorRequest {
  string repo = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root to inspect or repair."
    }
  ];

  string runtime = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "runtime" }
      help: "Runtime name: codex, gemini, copilot, or all."
    }
  ];

  bool fix = 3 [
    (cmdproto.v1.param) = {
      flag: { long: "fix" }
      help: "Apply doctor repairs instead of reporting only."
    }
  ];

  string hook_script = 4 [(cmdproto.v1.param) = { flag: { long: "hook-script" } help: "Explicit runtime hook script path." }];
}

message HandbookRequest {
  string repo = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root containing canonical .loopship system files."
    }
  ];

  bool raw = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "raw" }
      help: "Return the rendered Markdown in the machine response instead of writing a temp file."
    }
  ];

  bool duplicates = 3 [(cmdproto.v1.param) = { flag: { long: "duplicates" } help: "Report duplicate canonical prose." }];
  bool fix_duplicates = 4 [(cmdproto.v1.param) = { flag: { long: "fix-duplicates" } help: "Apply schema-safe duplicate prose rewrites." }];
  bool fail_on_duplicates = 5 [(cmdproto.v1.param) = { flag: { long: "fail-on-duplicates" } help: "Exit nonzero when duplicate groups remain." }];
  int32 min_chars = 6 [(cmdproto.v1.param) = { flag: { long: "min-chars" } help: "Minimum duplicate prose length." }];
}

message InitResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"anyOf\":[{\"$ref\":\"schemas/steps/fastflow-response.yaml\"},{\"$ref\":\"schemas/steps/init-output.yaml\"},{\"type\":\"object\",\"required\":[\"mode\",\"files\"],\"properties\":{\"mode\":{\"type\":\"string\"},\"repo\":{\"type\":\"string\"},\"files\":{\"type\":\"array\",\"items\":{\"type\":\"string\"}}},\"additionalProperties\":true}]}"
    }
  ];
}

message HookResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"anyOf\":[{\"$ref\":\"schemas/steps/fastflow-response.yaml\"},{\"$ref\":\"schemas/steps/hook-output.yaml\"},{\"type\":\"object\",\"maxProperties\":0}]}"
    }
  ];
}

message ResumeResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"additionalProperties\":true}"
    }
  ];
}

message DoctorResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"required\":[\"status\"],\"properties\":{\"status\":{\"type\":\"string\"},\"repo\":{\"type\":\"string\"},\"items\":{\"type\":\"array\",\"items\":{\"type\":\"string\"}},\"rerun_with_fix\":{\"type\":\"boolean\"}},\"additionalProperties\":true}"
    }
  ];
}

message HandbookResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"oneOf\":[{\"required\":[\"path\",\"file_url\"],\"properties\":{\"path\":{\"type\":\"string\"},\"file_url\":{\"type\":\"string\"}},\"additionalProperties\":false},{\"required\":[\"markdown\"],\"properties\":{\"markdown\":{\"type\":\"string\"}},\"additionalProperties\":false},{\"required\":[\"repo\",\"min_chars\",\"duplicate_groups\",\"duplicate_count\"],\"properties\":{\"repo\":{\"type\":\"string\"},\"min_chars\":{\"type\":\"integer\",\"minimum\":1},\"duplicate_groups\":{\"type\":\"array\"},\"duplicate_count\":{\"type\":\"integer\",\"minimum\":0},\"applied_fixes\":{\"type\":\"array\",\"items\":{\"type\":\"string\"}},\"skipped_fixes\":{\"type\":\"array\",\"items\":{\"type\":\"string\"}},\"signature_path\":{\"type\":\"string\"}},\"additionalProperties\":false}]}"
    }
  ];
}
