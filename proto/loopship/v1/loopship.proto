edition = "2024";

package loopship.v1;

import "cmdproto/v1/options.proto";
import "google/protobuf/struct.proto";

service LoopshipService {
  rpc Init(InitRequest) returns (InitResponse) {
    option (cmdproto.v1.command) = {
      path: "init"
      summary: "Start or resume a Loopship quest from an objective."
      example: {
        command: "init loopship:build-the-app --repo . --runtime codex --flow swe --wtree build-the-app"
        description: "Start routing for a Loopship request."
        request_json: "{\"request\":\"loopship:build-the-app\",\"repo\":\".\",\"runtime\":\"codex\",\"flow\":\"swe\",\"wtree\":\"build-the-app\"}"
      }
    };
  }

  rpc Hook(HookRequest) returns (HookResponse) {
    option (cmdproto.v1.command) = {
      path: "hook"
      summary: "Handle a runtime hook event payload."
      example: {
        command: "hook --runtime codex --json {\"event\":\"Stop\",\"stop_reason\":\"none\"}"
        description: "Handle a runtime hook event."
        request_json: "{\"runtime\":\"codex\",\"payload\":{\"event\":\"Stop\",\"stop_reason\":\"none\"}}"
      }
    };
  }

  rpc Doctor(DoctorRequest) returns (DoctorResponse) {
    option (cmdproto.v1.command) = {
      path: "doctor"
      summary: "Inspect or repair Loopship runtime scaffolding."
      example: {
        command: "doctor --repo . --runtime all --fix"
        description: "Repair Loopship runtime scaffolding in a repo."
        request_json: "{\"repo\":\".\",\"runtime\":\"all\",\"fix\":true}"
      }
    };
  }

  rpc Handbook(HandbookRequest) returns (HandbookResponse) {
    option (cmdproto.v1.command) = {
      path: "handbook"
      summary: "Render the standalone Loopship handbook from canonical YAML."
      example: {
        command: "handbook --repo ."
        description: "Generate handbook Markdown in a recoverable system temp path and return its file URL."
        request_json: "{\"repo\":\".\"}"
      }
    };
  }
}

message InitRequest {
  string request = 1 [
    (cmdproto.v1.param) = {
      positional: { index: 1 }
      help: "Loopship objective text, usually prefixed with loopship:."
    }
  ];

  string repo = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root used for init."
    }
  ];

  string runtime = 3 [
    (cmdproto.v1.param) = {
      flag: { long: "runtime" }
      help: "Runtime name: codex, gemini, copilot, or all."
    }
  ];

  string flow = 4 [
    (cmdproto.v1.param) = {
      flag: { long: "flow" }
      help: "Flow id for init, default swe."
    }
  ];

  string wtree = 5 [
    (cmdproto.v1.param) = {
      flag: { long: "wtree" }
      help: "Explicit base worktree name."
    }
  ];
}

message HookRequest {
  string runtime = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "runtime" }
      help: "Runtime lane for hook handling."
    }
  ];

  string repo = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root for hook handling."
    }
  ];

  string wtree = 3 [
    (cmdproto.v1.param) = {
      flag: { long: "wtree" }
      help: "Optional explicit base worktree name."
    }
  ];

  google.protobuf.Struct payload = 4 [
    (cmdproto.v1.param) = {
      json: { enabled: true }
      help: "Runtime hook payload object."
    },
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"additionalProperties\":true}"
    }
  ];
}

message DoctorRequest {
  string repo = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root to inspect or repair."
    }
  ];

  string runtime = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "runtime" }
      help: "Runtime name: codex, gemini, copilot, or all."
    }
  ];

  bool fix = 3 [
    (cmdproto.v1.param) = {
      flag: { long: "fix" }
      help: "Apply doctor repairs instead of reporting only."
    }
  ];
}

message HandbookRequest {
  string repo = 1 [
    (cmdproto.v1.param) = {
      flag: { long: "repo" }
      help: "Repo root containing canonical .loopship system files."
    }
  ];

  bool raw = 2 [
    (cmdproto.v1.param) = {
      flag: { long: "raw" }
      help: "Return the rendered Markdown in the machine response instead of writing a temp file."
    }
  ];
}

message InitResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"anyOf\":[{\"$ref\":\"schemas/steps/init-output.yaml\"},{\"type\":\"object\",\"required\":[\"mode\",\"files\"],\"properties\":{\"mode\":{\"type\":\"string\"},\"repo\":{\"type\":\"string\"},\"files\":{\"type\":\"array\",\"items\":{\"type\":\"string\"}}},\"additionalProperties\":true}]}"
    }
  ];
}

message HookResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"anyOf\":[{\"$ref\":\"schemas/steps/hook-output.yaml\"},{\"type\":\"object\",\"maxProperties\":0}]}"
    }
  ];
}

message DoctorResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"required\":[\"status\"],\"properties\":{\"status\":{\"type\":\"string\"},\"repo\":{\"type\":\"string\"},\"items\":{\"type\":\"array\",\"items\":{\"type\":\"string\"}},\"rerun_with_fix\":{\"type\":\"boolean\"}},\"additionalProperties\":true}"
    }
  ];
}

message HandbookResponse {
  google.protobuf.Struct output = 1 [
    (cmdproto.v1.field_json_schema) = {
      json: "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"type\":\"object\",\"oneOf\":[{\"required\":[\"path\",\"file_url\"],\"properties\":{\"path\":{\"type\":\"string\"},\"file_url\":{\"type\":\"string\"}},\"additionalProperties\":false},{\"required\":[\"markdown\"],\"properties\":{\"markdown\":{\"type\":\"string\"}},\"additionalProperties\":false}]}"
    }
  ];
}
