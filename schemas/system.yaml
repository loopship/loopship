$schema: https://json-schema.org/draft/2020-12/schema
$id: loopo://schemas/system.yaml
title: Loopo Universal System Root v2
type: object
additionalProperties: false
required:
  - schema_version
  - id
  - title
  - kinds
  - text
  - scope_in
  - scope_out
  - objects
  - assertions
  - resources
properties:
  schema_version:
    const: 2
  id:
    $ref: "#/$defs/id"
  title:
    type: string
    minLength: 1
    maxLength: 120
  kinds:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: "#/$defs/system_kind"
  text:
    type: string
    minLength: 1
    maxLength: 800
    pattern: "\\n"
  scope_in:
    $ref: "#/$defs/nonempty_text_array"
  scope_out:
    $ref: "#/$defs/nonempty_text_array"
  objects:
    type: array
    minItems: 1
    maxItems: 128
    items:
      $ref: "#/$defs/object"
  assertions:
    type: array
    minItems: 1
    maxItems: 128
    items:
      $ref: "#/$defs/assertion"
  resources:
    type: array
    minItems: 1
    maxItems: 256
    items:
      $ref: "#/$defs/resource"
  memories:
    type: array
    minItems: 1
    maxItems: 64
    items:
      $ref: "#/$defs/memory"
x-loopo-semantic-rules: schemas/semantic-rules.yaml
$defs:
  id:
    type: string
    minLength: 1
    pattern: "^[a-z0-9][a-z0-9._-]*$"
  resource_ref:
    type: string
    minLength: 1
    pattern: "^resource:[a-z0-9][a-z0-9._-]*$"
  resource_target_ref:
    type: string
    minLength: 1
    pattern: "^resource:[a-z0-9][a-z0-9._-]*(#/.*)?$"
  object_ref:
    type: string
    minLength: 1
    pattern: "^object:[a-z0-9][a-z0-9._-]*$"
  assertion_ref:
    type: string
    minLength: 1
    pattern: "^assertion:[a-z0-9][a-z0-9._-]*$"
  memory_ref:
    type: string
    minLength: 1
    pattern: "^memory:[a-z0-9][a-z0-9._-]*$"
  ref:
    type: string
    minLength: 1
    pattern: "^((object|assertion|memory):[a-z0-9][a-z0-9._-]*|resource:[a-z0-9][a-z0-9._-]*(#/.*)?)$"
  ref_array:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: "#/$defs/ref"
  object_ref_array:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: "#/$defs/object_ref"
  resource_ref_array:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: "#/$defs/resource_ref"
  resource_target_ref_array:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: "#/$defs/resource_target_ref"
  nonempty_text_array:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
  system_kind:
    enum:
      - software
      - workflow
      - knowledge
      - data
      - model
      - agent
      - organization
      - artifact
  object_kind:
    enum:
      - area
      - actor
      - unit
      - interface
      - flow
      - store
      - asset
  assertion_kind:
    enum:
      - rule
      - behaviour
      - claim
      - assumption
      - limitation
  resource_kind:
    enum:
      - schema
      - document
      - artifact
      - evidence
  memory_kind:
    enum:
      - preference
      - learning
      - observation
  level:
    enum:
      - must
      - should
      - may
  state:
    enum:
      - draft
      - active
      - rejected
      - deprecated
      - archived
  role:
    enum:
      - canonical
      - reference
      - generated
  links:
    type: object
    minProperties: 1
    additionalProperties: false
    properties:
      about:
        $ref: "#/$defs/ref_array"
      part_of:
        $ref: "#/$defs/object_ref_array"
      uses:
        $ref: "#/$defs/ref_array"
      constrains:
        $ref: "#/$defs/ref_array"
      supported_by:
        $ref: "#/$defs/resource_target_ref_array"
      derives_from:
        $ref: "#/$defs/ref_array"
      supersedes:
        $ref: "#/$defs/ref_array"
  object:
    type: object
    additionalProperties: false
    required:
      - id
      - kind
      - text
    properties:
      id:
        $ref: "#/$defs/id"
      kind:
        $ref: "#/$defs/object_kind"
      text:
        type: string
        minLength: 1
        pattern: "\\n"
      links:
        $ref: "#/$defs/links"
      state:
        $ref: "#/$defs/state"
  assertion:
    type: object
    additionalProperties: false
    required:
      - id
      - kind
      - level
      - text
    properties:
      id:
        $ref: "#/$defs/id"
      kind:
        $ref: "#/$defs/assertion_kind"
      level:
        $ref: "#/$defs/level"
      text:
        type: string
        minLength: 1
        pattern: "\\n"
      links:
        $ref: "#/$defs/links"
      state:
        $ref: "#/$defs/state"
    allOf:
      - if:
          required:
            - level
          properties:
            level:
              const: must
        then:
          required:
            - links
  resource:
    type: object
    additionalProperties: false
    required:
      - id
      - kind
      - role
      - location
      - schema_ref
    properties:
      id:
        $ref: "#/$defs/id"
      kind:
        $ref: "#/$defs/resource_kind"
      role:
        $ref: "#/$defs/role"
      location:
        type: string
        minLength: 1
      schema_ref:
        type: string
        minLength: 1
        pattern: "^(self|loopo://schemas/[a-z0-9._/-]+\\.yaml)$"
      text:
        type: string
        minLength: 1
        pattern: "\\n"
      links:
        $ref: "#/$defs/links"
      state:
        $ref: "#/$defs/state"
      media:
        type: string
        minLength: 1
    allOf:
      - if:
          required:
            - kind
            - schema_ref
          properties:
            kind:
              const: schema
        then:
          properties:
            schema_ref:
              const: self
  memory:
    type: object
    additionalProperties: false
    required:
      - id
      - kind
      - text
    properties:
      id:
        $ref: "#/$defs/id"
      kind:
        $ref: "#/$defs/memory_kind"
      text:
        type: string
        minLength: 1
        pattern: "\\n"
      links:
        $ref: "#/$defs/links"
