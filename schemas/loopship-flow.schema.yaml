$schema: https://json-schema.org/draft/2020-12/schema
title: loopship swf subset profile
x-loopship-validation:
  facade:
    entrypoint: validateWorkflowRecord
  phases:
    - loopship_schema
    - official_swf_schema
    - loopship_semantics
  allowedDslVersions:
    - 1.0.3
  allowedFeatures:
    - set
    - call
    - do
    - switch
    - try/catch
    - run.workflow
allOf:
  - $ref: https://serverlessworkflow.io/schemas/1.0.3/workflow.yaml
  - type: object
    additionalProperties: false
    required:
      - document
      - do
    properties:
      document:
        type: object
        additionalProperties: true
        required:
          - dsl
          - namespace
          - name
          - version
        properties:
          dsl:
            const: 1.0.3
          namespace:
            type: string
            minLength: 1
          name:
            type: string
            minLength: 1
          version:
            type: string
            pattern: ^\d+\.\d+\.\d+(?:[-+].+)?$
          summary:
            type: string
          metadata:
            type: object
            additionalProperties: true
            properties:
              loopship:
                type: object
                additionalProperties: true
                required:
                  - kind
                properties:
                  kind:
                    type: string
                    enum:
                      - flow
                      - step-workflow
                  version:
                    type: integer
                    minimum: 1
                  defaultStage:
                    type: string
                    minLength: 1
                  stages:
                    type: object
                    additionalProperties:
                      type: object
                      additionalProperties: true
                      required:
                        - step
                        - transitions
                      properties:
                        step:
                          type: string
                          minLength: 1
                        task:
                          type: string
                          minLength: 1
                        transitions:
                          type: object
                          additionalProperties:
                            type: string
                            minLength: 1
                  subflows:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      required:
                        - id
                        - type
                        - starts_at
                        - returns_to
                        - trigger
                      properties:
                        id:
                          type: string
                          minLength: 1
                        type:
                          type: string
                          enum:
                            - in_flow_detour
                            - spawned_quest
                        starts_at:
                          type: string
                          minLength: 1
                        returns_to:
                          type: string
                          minLength: 1
                        trigger:
                          type: string
                          minLength: 1
                        result_step:
                          type: string
                          minLength: 1
                        flow_id:
                          type: string
                          minLength: 1
                  stepId:
                    type: string
                    minLength: 1
      input:
        type: object
        additionalProperties: true
      output:
        type: object
        additionalProperties: true
      do:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/namedTask"
$defs:
  namedTask:
    type: object
    minProperties: 1
    maxProperties: 1
    additionalProperties:
      $ref: "#/$defs/task"
  task:
    type: object
    additionalProperties: true
    properties:
      if:
        type: string
      then:
        type: string
      input:
        type: object
        additionalProperties: true
        properties:
          schema:
            type: object
            additionalProperties: true
            properties:
              format:
                const: json
              document:
                type: object
      output:
        type: object
        additionalProperties: true
        properties:
          schema:
            type: object
            additionalProperties: true
            properties:
              format:
                const: json
              document:
                type: object
      metadata:
        type: object
        additionalProperties: true
        properties:
          loopship:
            type: object
            additionalProperties: true
            properties:
              stageId:
                type: string
              stepId:
                type: string
              stepWorkflow:
                type: string
              handler:
                type: string
              inputStep:
                type:
                  - string
                  - "null"
              summary:
                type: string
              instructions:
                type: string
              resultSchemaPath:
                type: string
      call:
        type: string
      set:
        type: object
        additionalProperties: true
      do:
        type: array
        items:
          $ref: "#/$defs/namedTask"
      switch:
        type: array
        items:
          type: object
          minProperties: 1
          maxProperties: 1
          additionalProperties:
            type: object
            additionalProperties: true
      try:
        type: array
        items:
          $ref: "#/$defs/namedTask"
      catch:
        type: object
        additionalProperties: true
      run:
        type: object
        additionalProperties: true
