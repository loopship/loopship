$schema: https://json-schema.org/draft/2020-12/schema
$id: loopship://schemas/tasks.yaml
title: Loopship Tasks YAML Model v4
type: object
additionalProperties: false
required:
  - schema_version
  - wtree
  - quest_id
  - flow_id
  - flow_version
  - stage
  - prompt
  - context_root
  - coordinator_branch
  - coordinator_worktree
  - question_rounds
  - plan_detail
  - validation_receipt
  - verification_receipt
  - tasks
properties:
  schema_version:
    const: 4
  wtree:
    type: string
  quest_id:
    type: string
  flow_id:
    type: string
  flow_version:
    type: integer
  stage:
    type: string
  prompt:
    type: string
  context_root:
    type: string
  resolution_source:
    type: string
  coordinator_branch:
    type: string
  coordinator_worktree:
    type: string
  parent_wtree:
    type: string
  parent_task_id:
    type: string
  parent_context_ref:
    type: string
  landing_target_branch:
    type: string
  landing_target_worktree:
    type: string
  landed_commit:
    type: string
  landing_strategy:
    type: string
  assumptions:
    type: array
    items:
      type: string
  constraints:
    type: array
    items:
      type: string
  question_rounds:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - questions
      properties:
        questions:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - id
              - question
            properties:
              id:
                type: string
              question:
                type: string
              impact:
                type: string
              default:
                type: string
              status:
                enum:
                  - open
                  - answered
                  - defaulted
              answer:
                type: string
              accepted_default:
                type: boolean
  plan_detail:
    type: object
    additionalProperties: false
    required:
      - classification
      - scope
      - summary
      - rationale
      - system_context
      - high_impact_unknowns
      - defaulted_unknowns
      - verification_targets
      - decomposition_rationale
    properties:
      classification:
        type: string
      scope:
        type: string
      summary:
        type: string
      rationale:
        type: string
      system_context:
        $ref: steps/common.yaml#/$defs/system_context
      high_impact_unknowns:
        type: array
        items:
          type: string
      defaulted_unknowns:
        type: array
        items:
          type: string
      verification_targets:
        type: array
        items:
          type: string
      decomposition_rationale:
        type: string
  validation_receipt:
    type: object
    additionalProperties: false
    required:
      - status
      - checks
    properties:
      status:
        type: string
      checks:
        type: array
        items:
          type: object
  verification_receipt:
    type: object
    additionalProperties: false
    required:
      - status
      - acceptance_trace
      - risks
    properties:
      status:
        type: string
      acceptance_trace:
        type: array
        items:
          type: object
      risks:
        type: array
        items:
          type: object
  tasks:
    type: array
    items:
      $ref: steps/common.yaml#/$defs/task_graph_task
