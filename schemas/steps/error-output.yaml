$schema: https://json-schema.org/draft/2020-12/schema
$id: schemas/steps/error-output.yaml
title: Loopo V3 Error Output
type: object
additionalProperties: false
required:
  - schema_version
  - kind
  - schema_path
  - error
properties:
  schema_version:
    const: 3
  kind:
    const: error
  schema_path:
    const: schemas/steps/error-output.yaml
  error:
    type: string
  wtree:
    type: string
  state:
    type: string
  schema:
    $ref: common.yaml#/$defs/schema_ref
  expected_output_schema:
    $ref: common.yaml#/$defs/schema_ref_or_embedded
  errors:
    type: array
    items:
      type: string
  command:
    type: string
  replacement:
    type: array
    items:
      $ref: common.yaml#/$defs/command
