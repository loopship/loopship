$schema: https://json-schema.org/draft/2020-12/schema
$id: schemas/steps/archive-output.yaml
title: Loopship V3 Archive Output
type: object
additionalProperties: false
required:
  - task
  - terminal
properties:
  schema_version:
    const: 3
  kind:
    const: quest_step
  schema_path:
    const: schemas/steps/archive-output.yaml
  wtree:
    type: string
  quest_id:
    type: string
  flow_id:
    type: string
  flow_version:
    type: integer
  current_stage:
    type: string
  summary:
    type: string
  task:
    allOf:
      - $ref: common.yaml#/$defs/compact_step
      - type: object
        properties:
          id:
            const: archived
  terminal:
    const: true
  landing:
    type: object
    additionalProperties: false
    required:
      - source_branch
      - target_branch
      - target_worktree
      - landed_commit
      - strategy
    properties:
      source_branch:
        type: string
      target_branch:
        type: string
      target_worktree:
        type: string
      landed_commit:
        type: string
      strategy:
        enum:
          - already-up-to-date
          - fast-forward
          - merge-commit
