$schema: https://json-schema.org/draft/2020-12/schema
$id: schemas/steps/archive-output.yaml
title: Loopo V3 Archive Output
type: object
additionalProperties: false
required:
  - step
  - output_schema
  - commands
properties:
  schema_version:
    const: 3
  kind:
    const: quest_step
  schema_path:
    const: schemas/steps/archive-output.yaml
  wtree:
    type: string
  quest_id:
    type: string
  flow_id:
    type: string
  flow_version:
    type: integer
  step:
    oneOf:
      - const: archived
      - allOf:
          - $ref: common.yaml#/$defs/compact_step
          - type: object
            properties:
              id:
                const: archived
  state:
    type: string
  summary:
    type: string
  output_schema:
    type: "null"
  allowed_transitions:
    $ref: common.yaml#/$defs/transitions
  context:
    $ref: common.yaml#/$defs/step_context
  commands:
    $ref: common.yaml#/$defs/step_commands
  docs:
    $ref: common.yaml#/$defs/docs
  landing:
    type: object
    additionalProperties: false
    required:
      - source_branch
      - target_branch
      - target_worktree
      - landed_commit
      - strategy
    properties:
      source_branch:
        type: string
      target_branch:
        type: string
      target_worktree:
        type: string
      landed_commit:
        type: string
      strategy:
        enum:
          - already-up-to-date
          - fast-forward
          - merge-commit
