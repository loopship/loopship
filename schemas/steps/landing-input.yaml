$schema: https://json-schema.org/draft/2020-12/schema
$id: schemas/steps/landing-input.yaml
title: Loopship V3 Landing Input
type: object
additionalProperties: false
required:
  - step
  - status
  - summary
properties:
  step:
    const: landing
  status:
    enum:
      - landed
      - blocked
  summary:
    type: string
