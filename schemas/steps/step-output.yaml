$schema: https://json-schema.org/draft/2020-12/schema
$id: schemas/steps/step-output.yaml
title: Loopship V3 Step Output
type: object
additionalProperties: false
required:
  - step
  - output_schema
  - commands
properties:
  schema_version:
    const: 3
  kind:
    const: quest_step
  schema_path:
    const: schemas/steps/step-output.yaml
  wtree:
    type: string
  quest_id:
    type: string
  flow_id:
    type: string
  flow_version:
    type: integer
  step:
    oneOf:
      - type: string
      - $ref: common.yaml#/$defs/compact_step
  state:
    type: string
  summary:
    type: string
  output_schema:
    $ref: common.yaml#/$defs/schema_ref_or_embedded
  allowed_transitions:
    $ref: common.yaml#/$defs/transitions
  context:
    $ref: common.yaml#/$defs/step_context
  commands:
    $ref: common.yaml#/$defs/step_commands
  docs:
    $ref: common.yaml#/$defs/docs
  requirements:
    type: array
    items:
      type: string
