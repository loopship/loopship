$schema: https://json-schema.org/draft/2020-12/schema
$id: schemas/steps/child-result-input.yaml
title: Loopship V3 Child Result Input
type: object
additionalProperties: false
required:
  - task_id
  - child_wtree
  - status
  - evidence
allOf:
  - if:
      properties:
        status:
          const: passed
    then:
      required:
        - merge_commit
properties:
  task_id:
    type: string
  child_wtree:
    type: string
  status:
    enum:
      - passed
      - blocked
      - failed
  evidence:
    type: array
    items:
      $ref: common.yaml#/$defs/evidence
  branch_ref:
    type: string
  worktree_path:
    type: string
  merge_target:
    type: string
  merge_lease_id:
    type: string
  merge_commit:
    type: string
