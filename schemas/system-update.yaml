$schema: https://json-schema.org/draft/2020-12/schema
$id: loopship://schemas/system-update.yaml
title: Loopship System Update
type: object
additionalProperties: false
required:
  - schema_version
  - mode
  - summary
properties:
  schema_version:
    const: 1
  mode:
    enum:
      - no_change
      - replace
  summary:
    type: string
    minLength: 1
  root:
    $ref: loopship://schemas/system.yaml
  external_docs:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - op
        - resource_ref
      properties:
        op:
          enum:
            - upsert
            - delete
        resource_ref:
          $ref: loopship://schemas/system.yaml#/$defs/resource_ref
        document:
          oneOf:
            - $ref: loopship://schemas/docs/software-architecture.yaml
            - $ref: loopship://schemas/docs/decision-records.yaml
            - $ref: loopship://schemas/docs/workflow-spec.yaml
            - $ref: loopship://schemas/docs/agent-system-card.yaml
            - $ref: loopship://schemas/docs/knowledge-report.yaml
            - $ref: loopship://schemas/docs/dataset-datasheet.yaml
            - $ref: loopship://schemas/docs/model-card.yaml
            - $ref: loopship://schemas/docs/business-architecture.yaml
            - $ref: loopship://schemas/docs/artifact-bom.yaml
            - $ref: loopship://schemas/system-pack.yaml
allOf:
  - if:
      properties:
        mode:
          const: replace
    then:
      required:
        - root
  - if:
      properties:
        external_docs:
          type: array
    then:
      properties:
        external_docs:
          items:
            allOf:
              - if:
                  properties:
                    op:
                      const: upsert
                then:
                  required:
                    - document
