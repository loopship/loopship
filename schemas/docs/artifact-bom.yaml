$schema: https://json-schema.org/draft/2020-12/schema
$id: loopship://schemas/docs/artifact-bom.yaml
title: Loopship Artifact Bill Of Materials Document v2
type: object
additionalProperties: false
required:
  - schema_version
  - id
  - title
  - text
  - standard_alignment
  - identity
  - composition
  - dependencies
  - build
  - provenance
  - licenses
  - security
  - distribution
  - verification
  - lifecycle
properties:
  schema_version:
    const: 2
  id:
    $ref: loopship://schemas/system.yaml#/$defs/id
  title:
    type: string
    minLength: 1
    maxLength: 160
  text:
    $ref: "#/$defs/prose"
  standard_alignment:
    $ref: "#/$defs/prose_map"
  identity:
    type: object
    additionalProperties: false
    required:
      - name
      - version
      - kind
      - supplier
      - authors
      - text
    properties:
      name:
        type: string
        minLength: 1
      version:
        type: string
        minLength: 1
      kind:
        type: string
        minLength: 1
      supplier:
        type: string
        minLength: 1
      authors:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
      text:
        $ref: "#/$defs/prose"
  composition:
    type: object
    additionalProperties: false
    required:
      - components
    properties:
      components:
        type: object
        minProperties: 1
        propertyNames:
          $ref: "#/$defs/key"
        additionalProperties:
          type: object
          additionalProperties: false
          required:
            - name
            - version
            - type
            - text
          properties:
            name:
              type: string
              minLength: 1
            version:
              type: string
              minLength: 1
            type:
              type: string
              minLength: 1
            license:
              type: string
            purl:
              type: string
            text:
              $ref: "#/$defs/prose"
  dependencies:
    $ref: "#/$defs/prose_map"
  build:
    type: object
    additionalProperties: false
    required:
      - environment
      - toolchain
      - commands
    properties:
      environment:
        $ref: "#/$defs/prose"
      toolchain:
        $ref: "#/$defs/prose_array"
      commands:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
  provenance:
    $ref: "#/$defs/prose_map"
  licenses:
    $ref: "#/$defs/prose_map"
  security:
    type: object
    additionalProperties: false
    required:
      - vulnerabilities
      - attestations
    properties:
      vulnerabilities:
        $ref: "#/$defs/prose_map"
      attestations:
        $ref: "#/$defs/resource_map"
  distribution:
    type: object
    additionalProperties: false
    required:
      - locations
      - checksums
    properties:
      locations:
        $ref: loopship://schemas/system.yaml#/$defs/resource_ref_array
      checksums:
        type: object
        minProperties: 1
        propertyNames:
          $ref: "#/$defs/key"
        additionalProperties:
          type: object
          additionalProperties: false
          required:
            - algorithm
            - value
          properties:
            algorithm:
              type: string
              minLength: 1
            value:
              type: string
              minLength: 1
  verification:
    $ref: "#/$defs/prose_map"
  lifecycle:
    type: object
    additionalProperties: false
    required:
      - status
      - text
    properties:
      status:
        type: string
        minLength: 1
      release_date:
        type: string
        format: date
      deprecation_policy:
        $ref: "#/$defs/prose"
      text:
        $ref: "#/$defs/prose"
$defs:
  key:
    type: string
    pattern: "^[a-z0-9][a-z0-9._-]*$"
  prose:
    type: string
    minLength: 20
    pattern: "\\n"
  prose_array:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 20
  prose_map:
    type: object
    minProperties: 1
    propertyNames:
      $ref: "#/$defs/key"
    additionalProperties:
      $ref: "#/$defs/prose"
  resource_map:
    type: object
    minProperties: 1
    propertyNames:
      $ref: "#/$defs/key"
    additionalProperties:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          $ref: "#/$defs/prose"
        resource_ref:
          $ref: loopship://schemas/system.yaml#/$defs/resource_ref
        links:
          $ref: loopship://schemas/system.yaml#/$defs/links
