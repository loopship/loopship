$schema: https://json-schema.org/draft/2020-12/schema
$id: loopship://schemas/docs/model-card.yaml
title: Loopship Model Card Document v2
type: object
additionalProperties: false
required:
  - schema_version
  - id
  - title
  - text
  - standard_alignment
  - model_details
  - intended_use
  - factors
  - training_data
  - evaluation_data
  - metrics
  - quantitative_analyses
  - ethical_considerations
  - caveats_recommendations
  - deployment
  - monitoring
  - security
properties:
  schema_version:
    const: 2
  id:
    $ref: loopship://schemas/system.yaml#/$defs/id
  title:
    type: string
    minLength: 1
    maxLength: 160
  text:
    $ref: "#/$defs/prose"
  links:
    $ref: loopship://schemas/system.yaml#/$defs/links
  standard_alignment:
    $ref: "#/$defs/prose_map"
  model_details:
    type: object
    additionalProperties: false
    required:
      - name
      - version
      - type
      - owners
      - license
      - text
    properties:
      name:
        type: string
        minLength: 1
      version:
        type: string
        minLength: 1
      type:
        type: string
        minLength: 1
      owners:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
      license:
        type: string
        minLength: 1
      text:
        $ref: "#/$defs/prose"
  intended_use:
    type: object
    additionalProperties: false
    required:
      - primary_uses
      - out_of_scope_uses
      - users
    properties:
      primary_uses:
        $ref: "#/$defs/prose_array"
      out_of_scope_uses:
        $ref: "#/$defs/prose_array"
      users:
        $ref: "#/$defs/prose_array"
  factors:
    $ref: "#/$defs/prose_map"
  training_data:
    $ref: "#/$defs/resource_map"
  evaluation_data:
    $ref: "#/$defs/resource_map"
  metrics:
    type: object
    minProperties: 1
    propertyNames:
      $ref: "#/$defs/key"
    additionalProperties:
      type: object
      additionalProperties: false
      required:
        - text
        - value
      properties:
        text:
          $ref: "#/$defs/prose"
        value:
          type:
            - string
            - number
            - boolean
  quantitative_analyses:
    $ref: "#/$defs/prose_map"
  ethical_considerations:
    $ref: "#/$defs/prose_map"
  caveats_recommendations:
    $ref: "#/$defs/prose_map"
  deployment:
    $ref: "#/$defs/prose_map"
  monitoring:
    $ref: "#/$defs/prose_map"
  security:
    $ref: "#/$defs/prose_map"
$defs:
  key:
    type: string
    pattern: "^[a-z0-9][a-z0-9._-]*$"
  prose:
    type: string
    minLength: 20
    pattern: "\\n"
  prose_array:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 20
  prose_map:
    type: object
    minProperties: 1
    propertyNames:
      $ref: "#/$defs/key"
    additionalProperties:
      $ref: "#/$defs/prose"
  resource_map:
    type: object
    minProperties: 1
    propertyNames:
      $ref: "#/$defs/key"
    additionalProperties:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          $ref: "#/$defs/prose"
        resource_ref:
          $ref: loopship://schemas/system.yaml#/$defs/resource_ref
        links:
          $ref: loopship://schemas/system.yaml#/$defs/links
