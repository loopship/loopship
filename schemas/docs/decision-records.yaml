$schema: https://json-schema.org/draft/2020-12/schema
$id: loopo://schemas/docs/decision-records.yaml
title: Loopo Decision Records Document v2
type: object
additionalProperties: false
required:
  - schema_version
  - id
  - title
  - text
  - standard_alignment
  - decisions
properties:
  schema_version:
    const: 2
  id:
    $ref: loopo://schemas/system.yaml#/$defs/id
  title:
    type: string
    minLength: 1
    maxLength: 160
  text:
    $ref: "#/$defs/prose"
  links:
    $ref: loopo://schemas/system.yaml#/$defs/links
  standard_alignment:
    $ref: "#/$defs/prose_map"
  decisions:
    type: object
    minProperties: 1
    propertyNames:
      $ref: "#/$defs/key"
    additionalProperties:
      type: object
      additionalProperties: false
      required:
        - state
        - date
        - title
        - context
        - drivers
        - options
        - decision
        - rationale
        - consequences
      properties:
        state:
          enum:
            - proposed
            - accepted
            - rejected
            - deprecated
            - superseded
        date:
          type: string
          format: date
        title:
          type: string
          minLength: 1
          maxLength: 160
        context:
          $ref: "#/$defs/prose"
        drivers:
          $ref: "#/$defs/prose_array"
        options:
          type: object
          minProperties: 1
          propertyNames:
            $ref: "#/$defs/key"
          additionalProperties:
            type: object
            additionalProperties: false
            required:
              - text
              - tradeoffs
            properties:
              text:
                $ref: "#/$defs/prose"
              tradeoffs:
                $ref: "#/$defs/prose_array"
        decision:
          $ref: "#/$defs/prose"
        rationale:
          $ref: "#/$defs/prose"
        consequences:
          $ref: "#/$defs/prose_array"
        links:
          $ref: loopo://schemas/system.yaml#/$defs/links
$defs:
  key:
    type: string
    pattern: "^[a-z0-9][a-z0-9._-]*$"
  prose:
    type: string
    minLength: 20
    pattern: "\\n"
  prose_array:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 20
  prose_map:
    type: object
    minProperties: 1
    propertyNames:
      $ref: "#/$defs/key"
    additionalProperties:
      $ref: "#/$defs/prose"
