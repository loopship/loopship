schema_version: 2
id: workflow-spec
title: Workflow Specification
text: |-
  Full workflow specification for Loopo quest execution and lifecycle orchestration across
  root and child worktrees.
links:
  about:
    - object:swe-flow
standard_alignment:
  bpmn-process-specification: |-
    Aligns with BPMN and process specification concepts including participants, triggers,
    inputs, outputs, lanes, steps, gateways, events, data objects, invariants, exceptions,
    monitoring, and diagrams.
purpose: |-
  Loopo coordinates quest work from initial request through planning, clarification, task
  graph approval, child execution, verification, durable system update, landing, and
  archive.
participants:
  user:
    kind: human
    text: |-
      The user supplies goals, clarification answers, approval decisions, and final acceptance
      expectations when the plan cannot safely infer them.
  root-agent:
    kind: agent
    text: |-
      The root agent coordinates planning, task graph creation, child dispatch, verification,
      and system-update review without impersonating leaf child workers.
  loopo-runtime:
    kind: system
    text: |-
      The Loopo runtime stores task state, validates step payloads, emits child commands, and
      controls lifecycle transitions.
triggers:
  task-intake: |-
    A quest starts from a schema-backed task payload submitted through loopo init or a
    follow-up quest continuation command.
inputs:
  task-yaml:
    schema_ref: loopo://schemas/tasks.yaml
    text: |-
      Task YAML records the goal, constraints, question rounds, accepted answers, task graph,
      validation, verification, landing, and archive evidence.
  system-root:
    schema_ref: loopo://schemas/system.yaml
    text: |-
      The system root provides first-read durable context and resource links that planning
      must scout before making execution decisions.
outputs:
  step-result:
    schema_ref: loopo://schemas/steps/step-output.yaml
    text: |-
      Step outputs report status, next command shape, generated child commands, receipts, and
      follow-up needs through strict schemas.
  signature:
    schema_ref: loopo://schemas/signature.yaml
    text: |-
      System-update completion refreshes the root signature sidecar for canonical root,
      schema, and resource files.
processes:
  root-quest-flow:
    text: |-
      The root quest flow coordinates planning, task graph approval, child execution,
      validation, verification, system update, landing, and archive.
    lanes:
      user: |-
        User lane owns clarification answers and serious approval decisions that cannot be
        inferred safely by the agent.
      agent: |-
        Agent lane owns scouting, planning, dispatch coordination, evidence review, and durable
        update proposal.
      runtime: |-
        Runtime lane owns schema validation, quest state persistence, command emission, and
        lifecycle transition enforcement.
    steps:
      plan:
        lane: agent
        text: |-
          Planning scouts durable system knowledge and asks focused questions before execution
          when product or architecture intent is not decision-complete.
      execute:
        lane: agent
        text: |-
          Execution dispatches leaf child tasks into dedicated worktrees and records their
          returned evidence in canonical quest state.
      validate:
        lane: runtime
        text: |-
          Validation records checks for child work and prepares evidence for verification before
          the quest can proceed to final review.
      verify:
        lane: runtime
        text: |-
          Verification validates acceptance traces, risks, runtime contracts, schema coherence,
          and lifecycle evidence before landing.
      system-update:
        lane: agent
        text: |-
          System update writes only durable semantic changes justified by verified evidence and
          regenerates the signature sidecar.
      landing:
        lane: runtime
        text: |-
          Landing performs the real git merge and records landed commit plus merge strategy for
          archive and later audit.
    gateways:
      needs-questions: |-
        If planning finds unresolved product, architecture, or verification decisions, the quest
        pauses for colocated questions and answers.
      ready-to-execute: |-
        If planning is decision-complete, the task graph can proceed to bounded child execution
        without another clarification round.
      needs-replanning: |-
        Replanning is the only detour for materially changing tasks after task graph approval,
        preserving execution state coherence.
    events:
      child-finished: |-
        Child completion returns status, evidence, and merge information to the root quest state
        for validation and verification.
      hook-stop: |-
        Runtime stop events invoke hook continuation checks only when the selector, state,
        duplicate, drift, and budget guards permit continuation.
data_objects:
  task-yaml: |-
    Task YAML is the canonical dossier for plan details, question rounds, task graph state,
    child evidence, verification, landing, and archive receipts.
  system-yaml: |-
    System YAML is the durable semantic frontier that planning and system_update must read
    and preserve.
  events-jsonl: |-
    Events JSONL records compact append-only quest and hook audit history used for
    continuation decisions and evidence review.
  signature-yaml: |-
    Signature YAML records root and canonical resource digest coverage after system updates
    and proves current canonical docs match the signed state.
invariants:
  planning-before-execution: |-
    Execution must not proceed until required planning, clarification answers, accepted
    defaults, and task graph approval are resolved.
  child-leaf-boundary: |-
    Child quests created for task execution are leaf workers and must not recursively create
    child quests unless explicitly planned.
  one-task-one-child: |-
    Each task row maps to exactly one child CLI-agent flow and one child worktree, so hidden
    task splitting is rejected.
  landed-receipt-required: |-
    When landing is part of the lifecycle target, archived output must carry the landed
    commit and merge strategy.
exceptions:
  ambiguous-question: |-
    Ambiguous planning questions must stay colocated with answers inside task records
    instead of being split into orphan answer arrays.
  verification-failure: |-
    Failed verification keeps the quest from landing or updating durable system knowledge
    until the evidence gap is resolved.
  managed-file-drift: |-
    Managed-file hash mismatches against current receipts block continuation and require
    doctor repair before execution can resume.
monitoring:
  lifecycle-matrix: |-
    Lifecycle matrix verification tracks whether planning, execution, validation,
    verification, system update, landing, and archive coverage remain coherent.
  system-model: |-
    System-model verification rejects unresolved links, missing required docs, shell docs,
    stale schema names, and unsigned canonical resources.
  hook-continuation: |-
    Hook verification checks explicit selector handling, duplicate suppression, stop
    reasons, drift guards, and continuation budgets.
diagrams:
  main-flow:
    kind: workflow
    syntax: mermaid
    text: |-
      Workflow diagram for root quest
      progression from task intake through archive.
    source: |-
      flowchart TD
        Intake[Task Intake] --> Plan[Planning]
        Plan --> Questions{Questions Needed?}
        Questions -->|yes| AwaitAnswers[Await User Answers]
        Questions -->|no| TaskGraph[Task Graph Approval]
        AwaitAnswers --> Plan
        TaskGraph --> Execute[Child Execution]
        Execute --> Validate[Validation]
        Validate --> Verify[Verification]
        Verify --> SystemUpdate[System Update]
        SystemUpdate --> Landing[Landing]
        Landing --> Archive[Archive]
  hook-continuation-sequence:
    kind: sequence
    syntax: mermaid
    text: |-
      Sequence diagram for hook event intake, worktree selection, continuation guards, and
      output.
    source: |-
      sequenceDiagram
        participant Runtime
        participant Hook
        participant Loopo
        participant QuestState
        Runtime->>Hook: stop event payload
        Hook->>Loopo: loopo hook --runtime
        Loopo->>QuestState: read tasks and events
        QuestState-->>Loopo: canonical snapshot
        Loopo-->>Runtime: continue or block decision
examples:
  plan-support-link:
    language: yaml
    text: |-
      Planning assertions can cite workflow invariants through resource JSON Pointer
      fragments.
    source: |-
      links:
        supported_by:
          - resource:workflow-spec#/invariants/planning-before-execution
  question-answer-shape:
    language: yaml
    text: |-
      Question and answer data stays colocated in
      task records to avoid orphan answer joins.
    source: |-
      question_rounds:
        - id: planning
          questions:
            - id: q1
              question: What runtime should be used?
              status: answered
              answer: codex
