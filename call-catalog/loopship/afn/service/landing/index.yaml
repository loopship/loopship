schemaVersion: fastflow/call-catalog-scope/v2
calls:
  - call: loopship.afn.service.landing.apply-outcome
    summary: "Apply the Loopship landing outcome: block, record a receipt, or merge and persist landed state."
    inputs:
      required:
        - repo
        - wtree
      optional:
        - status
        - receipt
        - summary
        - target_branch
        - target_worktree
        - source_branch
        - next_stage
        - request_id
        - dry_run
      schema:
        type: object
        additionalProperties: false
        required:
          - repo
          - wtree
        properties:
          repo:
            type: string
            minLength: 1
          wtree:
            type: string
            minLength: 1
          status:
            enum:
              - landed
              - blocked
          receipt:
            type: object
            additionalProperties: false
            required:
              - landed_commit
            properties:
              source_branch:
                type: string
              target_branch:
                type: string
              target_worktree:
                type: string
              landed_commit:
                type: string
                minLength: 1
              strategy:
                enum:
                  - already-up-to-date
                  - fast-forward
                  - merge-commit
                  - recorded
          summary:
            type: string
          target_branch:
            type: string
          target_worktree:
            type: string
          source_branch:
            type: string
          next_stage:
            type: string
          request_id:
            type: string
          dry_run:
            type: boolean
    preferWhen:
      - "A Loopship workflow needs to apply landing policy and record landed state."
    avoidWhen:
      - "The workflow only needs to inspect validation, verification, or review output."
    metadata:
      allowed_phases:
        - action
      effects:
        - git.merge
        - quest.land
  - call: loopship.afn.service.landing.cleanup-landed-worktrees
    summary: "Clean up landed Loopship quest worktrees and branches after durable landing evidence exists."
    inputs:
      required:
        - repo
        - wtree
      optional:
        - dry_run
      schema:
        type: object
        additionalProperties: false
        required:
          - repo
          - wtree
        properties:
          repo:
            type: string
            minLength: 1
          wtree:
            type: string
            minLength: 1
          dry_run:
            type: boolean
    preferWhen:
      - "A Loopship flow needs to clean up landed quest worktrees and branches."
    avoidWhen:
      - "The quest has not recorded durable landing evidence."
    metadata:
      allowed_phases:
        - action
      effects:
        - git.worktree.remove
        - git.branch.delete
