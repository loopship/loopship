schemaVersion: fastflow/call-catalog-scope/v2
calls:
  - call: loopship.afn.service.child.prepare-worktree
    summary: Prepare one Native DAG child quest and worktree at node dispatch time.
    inputs:
      required:
        - repo
        - wtree
        - task
      optional:
        - quest
        - parent
        - runtime
        - target_branch
        - target_worktree
        - supervise_step
        - dry_run
      schema:
        type: object
        additionalProperties: false
        required:
          - repo
          - wtree
          - task
        properties:
          repo:
            type: string
            minLength: 1
          wtree:
            type: string
            minLength: 1
          task:
            type: object
            additionalProperties: false
            properties:
              id:
                type: string
              task_id:
                type: string
              title:
                type: string
              name:
                type: string
              type:
                enum:
                  - coding
                  - general
              status:
                type: string
              dependencies:
                type: array
                items:
                  type: string
              depends_on:
                type: array
                items:
                  type: string
              scope_files:
                type: array
                items:
                  type: string
              scope:
                type: array
                items:
                  type: string
              spec_refs:
                type: array
                items:
                  type: string
              specs:
                type: array
                items:
                  type: string
              context_refs:
                type: array
                items:
                  type: string
              context:
                type: array
                items:
                  type: string
              branch_ref:
                type: string
              worktree_path:
                type: string
              child_wtree:
                type: string
              parent_wtree:
                type: string
              parent_task_id:
                type: string
              parent_context_ref:
                type: string
              concurrency_group:
                type: string
              merge_target:
                type: string
              merge_target_worktree:
                type: string
              merge_lease_id:
                type: string
              merge_commit:
                type: string
              system_impact_ref:
                type: string
              acceptance:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      type: string
              acceptance_criteria:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      type: string
          quest:
            type: object
            additionalProperties: true
            properties:
              prompt:
                type: string
              parent_wtree:
                type: string
              parent_task_id:
                type: string
              parent_context_ref:
                type: string
          parent:
            type: object
            additionalProperties: false
            properties:
              task_id:
                type: string
              parent_wtree:
                type: string
              parent_context_ref:
                type: string
              landing_target_branch:
                type: string
              landing_target_worktree:
                type: string
              merge_lease_id:
                type: string
          runtime:
            type: string
          target_branch:
            type: string
          target_worktree:
            type: string
          supervise_step:
            type: boolean
          dry_run:
            type: boolean
    preferWhen:
      - A Native Loopship DAG node becomes ready and needs its child quest/worktree.
    avoidWhen:
      - The workflow only needs reasoning, validation, verification, or model output.
    metadata:
      allowed_phases:
        - action
      effects:
        - worktree.prepare
        - quest.prepare
  - call: loopship.afn.service.child.validate-dag
    summary: Normalize a finite Loopship child DAG and reject unordered resource conflicts.
    inputs:
      required:
        - tasks
      optional:
        - max_concurrency
        - supervise_step
      schema:
        type: object
        additionalProperties: false
        required:
          - tasks
        properties:
          tasks:
            type: array
            minItems: 1
            items:
              type: object
              additionalProperties: false
              properties:
                id:
                  type: string
                task_id:
                  type: string
                title:
                  type: string
                name:
                  type: string
                type:
                  enum:
                    - coding
                    - general
                status:
                  type: string
                dependencies:
                  type: array
                  items:
                    type: string
                depends_on:
                  type: array
                  items:
                    type: string
                scope_files:
                  type: array
                  items:
                    type: string
                scope:
                  type: array
                  items:
                    type: string
                spec_refs:
                  type: array
                  items:
                    type: string
                specs:
                  type: array
                  items:
                    type: string
                context_refs:
                  type: array
                  items:
                    type: string
                context:
                  type: array
                  items:
                    type: string
                branch_ref:
                  type: string
                worktree_path:
                  type: string
                child_wtree:
                  type: string
                parent_wtree:
                  type: string
                parent_task_id:
                  type: string
                parent_context_ref:
                  type: string
                concurrency_group:
                  type: string
                merge_target:
                  type: string
                merge_target_worktree:
                  type: string
                merge_lease_id:
                  type: string
                merge_commit:
                  type: string
                system_impact_ref:
                  type: string
                acceptance:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                acceptance_criteria:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
          max_concurrency:
            type: integer
            minimum: 1
            maximum: 32
          supervise_step:
            type: boolean
    preferWhen:
      - A Loopship coordinator is about to bind its approved child task graph.
    avoidWhen:
      - A terminal child quest is executing its local assignment.
    metadata:
      allowed_phases:
        - action
      effects:
        - dag.read
  - call: loopship.afn.service.child.record-lifecycle
    summary: Persist one child quest lifecycle checkpoint without mutating its parent quest.
    inputs:
      required:
        - repo
        - wtree
        - task_id
        - status
        - request_id
      optional:
        - merge_commit
        - implementation_receipt
        - validation_receipt
        - verification_receipt
      schema:
        type: object
        additionalProperties: false
        required:
          - repo
          - wtree
          - task_id
          - status
          - request_id
        properties:
          repo:
            type: string
            minLength: 1
          wtree:
            type: string
            minLength: 1
          task_id:
            type: string
            minLength: 1
          status:
            enum:
              - implemented
              - validation_passed
              - validation_failed
              - verification_passed
              - verification_failed
          request_id:
            type: string
            minLength: 1
          merge_commit:
            type: string
          implementation_receipt:
            type: object
            additionalProperties: true
          validation_receipt:
            type: object
            additionalProperties: true
          verification_receipt:
            type: object
            additionalProperties: true
    preferWhen:
      - A Native child-lifecycle workflow has a durable local checkpoint to record.
    avoidWhen:
      - A coordinator needs to reconcile the parent task graph.
    metadata:
      allowed_phases:
        - action
      effects:
        - quest.child.write
  - call: loopship.afn.service.child.build-dag-reconciliation
    summary: Build one input-ordered parent reconciliation from a settled Native child DAG.
    inputs:
      required:
        - tasks
        - dag_result
      optional:
        - runtime
      schema:
        type: object
        additionalProperties: false
        required:
          - tasks
          - dag_result
        properties:
          tasks:
            type: array
            minItems: 1
            items:
              type: object
              additionalProperties: false
              properties:
                id:
                  type: string
                task_id:
                  type: string
                title:
                  type: string
                name:
                  type: string
                type:
                  enum:
                    - coding
                    - general
                status:
                  type: string
                dependencies:
                  type: array
                  items:
                    type: string
                depends_on:
                  type: array
                  items:
                    type: string
                scope_files:
                  type: array
                  items:
                    type: string
                scope:
                  type: array
                  items:
                    type: string
                spec_refs:
                  type: array
                  items:
                    type: string
                specs:
                  type: array
                  items:
                    type: string
                context_refs:
                  type: array
                  items:
                    type: string
                context:
                  type: array
                  items:
                    type: string
                branch_ref:
                  type: string
                worktree_path:
                  type: string
                child_wtree:
                  type: string
                parent_wtree:
                  type: string
                parent_task_id:
                  type: string
                parent_context_ref:
                  type: string
                concurrency_group:
                  type: string
                merge_target:
                  type: string
                merge_target_worktree:
                  type: string
                merge_lease_id:
                  type: string
                merge_commit:
                  type: string
                system_impact_ref:
                  type: string
                acceptance:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                acceptance_criteria:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
          dag_result:
            type: object
            additionalProperties: true
          runtime:
            type: object
            additionalProperties: true
    preferWhen:
      - A Native all-settled child DAG has reached its single parent reconciliation point.
    avoidWhen:
      - A child node is still running or awaiting input.
    metadata:
      allowed_phases:
        - action
      effects:
        - dag.read
