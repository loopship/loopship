do:
  - archived:
      input:
        schema:
          document:
            "$schema": "https://json-schema.org/draft/2020-12/schema"
            "$id": schemas/steps/step-request.yaml
            title: "Loopship Fastflow Step Request Payload"
            type: object
            additionalProperties: false
            properties:
              schema_version:
                const: loopship.step.request/v1
              kind:
                const: quest_step_request
              wtree:
                type: string
              quest_id:
                type: string
              flow_id:
                type: string
              flow_version:
                type: integer
              current_stage:
                type: string
              summary:
                type: string
              prompt:
                type: string
              repo:
                type: string
              repoRoot:
                type: string
              runtime:
                type: string
              tasks:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - title
                    - acceptance
                  properties:
                    id:
                      type: string
                    task_id:
                      type: string
                    title:
                      type: string
                    name:
                      type: string
                    type:
                      enum:
                        - coding
                        - general
                    status:
                      type: string
                    dependencies:
                      type: array
                      items:
                        type: string
                    depends_on:
                      type: array
                      items:
                        type: string
                    scope_files:
                      type: array
                      items:
                        type: string
                    scope:
                      type: array
                      items:
                        type: string
                    spec_refs:
                      type: array
                      items:
                        type: string
                    specs:
                      type: array
                      items:
                        type: string
                    context_refs:
                      type: array
                      items:
                        type: string
                    context:
                      type: array
                      items:
                        type: string
                    branch_ref:
                      type: string
                    worktree_path:
                      type: string
                    child_wtree:
                      type: string
                    concurrency_group:
                      type: string
                    merge_target:
                      type: string
                    merge_lease_id:
                      type: string
                    merge_commit:
                      type: string
                    system_impact_ref:
                      type: string
                    acceptance:
                      oneOf:
                        - type: string
                        - type: array
                          items:
                            type: string
                    acceptance_criteria:
                      oneOf:
                        - type: string
                        - type: array
                          items:
                            type: string
              question_rounds:
                type: array
                items:
                  type: object
                  additionalProperties: true
              plan_detail:
                type: object
                additionalProperties: true
              validation_receipt:
                type: object
                additionalProperties: true
              verification_receipt:
                type: object
                additionalProperties: true
              events:
                type: array
                items:
                  type: object
                  additionalProperties: true
              parent_wtree:
                type: string
              coordinator_branch:
                type: string
              coordinator_worktree:
                type: string
              landing_target_branch:
                type: string
              landing_target_worktree:
                type: string
              requirements:
                type: array
                items:
                  type: string
        from: "${inputs}"
      metadata:
        description: "Report final quest state only."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              terminal: true
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      run:
        script:
          language: js
          code: |-
            const array = (value) => Array.isArray(value) ? value : [];
            const tasks = array(inputs.tasks);
            const done = new Set(["child_merged", "child_archived", "done", "merged"]);
            const doneTaskCount = tasks.filter((task) => done.has(String((task || {}).status || ""))).length;
            const wtree = String(inputs.wtree || inputs.quest_id || "");
            return {
              status: "archived",
              stage: "archived",
              archived: true,
              summary: String(inputs.summary || "Quest archived."),
              wtree,
              task_count: tasks.length,
              done_task_count: doneTaskCount,
              parent_wtree: String(inputs.parent_wtree || ""),
              landing_target_branch: String(inputs.landing_target_branch || "")
            };
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action.value}"
output:
  schema:
    document:
      type: object
      additionalProperties: true
  as: "${state.steps.archived.action}"
