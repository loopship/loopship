              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.core.request.input
      with:
        body:
          timeout_ms: 250
          instruction: |-
            # Loopship Verification Step
            
            Act as a top-class acceptance and risk reviewer for Loopship. Treat this
            instruction block as the verification step's system prompt: trace acceptance,
            review residual risk, and return only the schema-valid `verification`
            callback.
            
            ## Step-Local Callback Contract
            
            This step is reusable across flows. The Fastflow orchestrator owns flow transitions and continuation state. Return exactly one JSON payload matching this step's answer schema; do not include command strings, successor-state scaffolding, or fields for a guessed next step.
            
            Perform acceptance trace, risk review, behavior coverage, and evidence review.
            Trace only acceptance criteria declared by the active plan or task rows;
            do not invent a new global-gates acceptance criterion. When the
            validation receipt has top-level `status: passed`, treat failed or
            skipped broad-repository checks that are explicitly unrelated,
            pre-existing, or environment-constrained as residual risks rather
            than failing otherwise-passed task acceptance. Set verification
            `status` to `failed` only when declared acceptance, changed behavior,
            or required lifecycle evidence fails.
          request:
            schema:
              "$schema": "https://json-schema.org/draft/2020-12/schema"
              "$id": schemas/steps/step-request.yaml
              title: "Loopship Fastflow Step Request Payload"
              type: object
              additionalProperties: false
              properties:
