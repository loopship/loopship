document:
  dsl: 1.0.3
  namespace: service-step
  name: child-result
  version: 0.1.0
  summary: "Submit the result of a completed child quest back to the parent flow."
  metadata:
    catalog:
      tags:
        - loopship
        - step
        - child_result
input:
  schema:
    document:
      "$schema": "https://json-schema.org/draft/2020-12/schema"
      "$id": schemas/steps/step-request.yaml
      title: "Loopship Fastflow Step Request Payload"
      type: object
      additionalProperties: false
      properties:
        schema_version:
          const: loopship.step.request/v1
        kind:
          const: quest_step_request
        wtree:
          type: string
        quest_id:
          type: string
        flow_id:
          type: string
        flow_version:
          type: integer
        current_stage:
          type: string
        summary:
          type: string
        prompt:
          type: string
        repo:
          type: string
        repoRoot:
          type: string
        runtime:
          type: string
        tasks:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - title
              - acceptance
            properties:
              id:
                type: string
              task_id:
                type: string
              title:
                type: string
              name:
                type: string
              type:
                enum:
                  - coding
                  - general
              status:
                type: string
              dependencies:
                type: array
                items:
                  type: string
              depends_on:
                type: array
                items:
                  type: string
              scope_files:
                type: array
                items:
                  type: string
              scope:
                type: array
                items:
                  type: string
              spec_refs:
                type: array
                items:
                  type: string
              specs:
                type: array
                items:
                  type: string
              context_refs:
                type: array
                items:
                  type: string
              context:
                type: array
                items:
                  type: string
              branch_ref:
                type: string
              worktree_path:
                type: string
              child_wtree:
                type: string
              concurrency_group:
                type: string
              merge_target:
                type: string
              merge_lease_id:
                type: string
              merge_commit:
                type: string
              system_impact_ref:
                type: string
              acceptance:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      type: string
              acceptance_criteria:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      type: string
        question_rounds:
          type: array
          items:
            type: object
            additionalProperties: true
        plan_detail:
          type: object
          additionalProperties: true
        validation_receipt:
          type: object
          additionalProperties: true
        verification_receipt:
          type: object
          additionalProperties: true
        events:
          type: array
          items:
            type: object
            additionalProperties: true
        parent_wtree:
          type: string
        coordinator_branch:
          type: string
        coordinator_worktree:
          type: string
        landing_target_branch:
          type: string
        landing_target_worktree:
          type: string
        requirements:
          type: array
          items:
            type: string
do:
  - child_result:
      input:
        schema:
          document:
            "$schema": "https://json-schema.org/draft/2020-12/schema"
            "$id": schemas/steps/step-request.yaml
            title: "Loopship Fastflow Step Request Payload"
            type: object
            additionalProperties: false
            properties:
              schema_version:
                const: loopship.step.request/v1
              kind:
                const: quest_step_request
              wtree:
                type: string
              quest_id:
                type: string
              flow_id:
                type: string
              flow_version:
                type: integer
              current_stage:
                type: string
              summary:
                type: string
              prompt:
                type: string
              repo:
                type: string
              repoRoot:
                type: string
              runtime:
                type: string
              tasks:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - title
                    - acceptance
                  properties:
                    id:
                      type: string
                    task_id:
                      type: string
                    title:
                      type: string
                    name:
                      type: string
                    type:
                      enum:
                        - coding
                        - general
                    status:
                      type: string
                    dependencies:
                      type: array
                      items:
                        type: string
                    depends_on:
                      type: array
                      items:
                        type: string
                    scope_files:
                      type: array
                      items:
                        type: string
                    scope:
                      type: array
                      items:
                        type: string
                    spec_refs:
                      type: array
                      items:
                        type: string
                    specs:
                      type: array
                      items:
                        type: string
                    context_refs:
                      type: array
                      items:
                        type: string
                    context:
                      type: array
                      items:
                        type: string
                    branch_ref:
                      type: string
                    worktree_path:
                      type: string
                    child_wtree:
                      type: string
                    concurrency_group:
                      type: string
                    merge_target:
                      type: string
                    merge_lease_id:
                      type: string
                    merge_commit:
                      type: string
                    system_impact_ref:
                      type: string
                    acceptance:
                      oneOf:
                        - type: string
                        - type: array
                          items:
                            type: string
                    acceptance_criteria:
                      oneOf:
                        - type: string
                        - type: array
                          items:
                            type: string
              question_rounds:
                type: array
                items:
                  type: object
                  additionalProperties: true
              plan_detail:
                type: object
                additionalProperties: true
              validation_receipt:
                type: object
                additionalProperties: true
              verification_receipt:
                type: object
                additionalProperties: true
              events:
                type: array
                items:
                  type: object
                  additionalProperties: true
              parent_wtree:
                type: string
              coordinator_branch:
                type: string
              coordinator_worktree:
                type: string
              landing_target_branch:
                type: string
              landing_target_worktree:
                type: string
              requirements:
                type: array
                items:
                  type: string
        from: "${inputs}"
      metadata:
        description: "Submit the result of a completed child quest back to the parent flow."
        inference: aitl.chat
        validation:
          post:
            kind: js
            expression: |
              return {
                ok: Boolean(state?.steps?.["child_result"]?.action?.decision),
                evidence: { waiting_for_decision: true }
              };
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.core.request.input
      with:
        body:
          instruction: |-
            # Loopship Child Result Step
            
            Act as a top-class parent quest reconciler for Loopship. Treat this
            instruction block as the child result step's system prompt: inspect canonical
            child evidence, submit one schema-valid `child_result` callback, and do not
            perform the child's implementation work inline in the parent session.
            
            ## Step-Local Callback Contract
            
            This step is reusable across flows. The Fastflow orchestrator owns flow transitions and continuation state. Return exactly one JSON payload matching this step's answer schema; do not include command strings, successor-state scaffolding, or fields for a guessed next step.
            
            Submit `status: passed` only after the child quest is archived and the
            child's landed commit is present in the planned merge target. Include the
            exact `task_id`, `child_wtree`, evidence refs, and `merge_commit`.
            
            Submit `status: blocked` or `status: failed` with evidence when the child
            cannot complete. Do not mark another task, invent a merge commit, or report
            success from agent prose without canonical child state.
          request:
            schema:
              "$schema": "https://json-schema.org/draft/2020-12/schema"
              "$id": schemas/steps/step-request.yaml
              title: "Loopship Fastflow Step Request Payload"
              type: object
              additionalProperties: false
              properties:
                schema_version:
                  const: loopship.step.request/v1
                kind:
                  const: quest_step_request
                wtree:
                  type: string
                quest_id:
                  type: string
                flow_id:
                  type: string
                flow_version:
                  type: integer
                current_stage:
                  type: string
                summary:
                  type: string
                prompt:
                  type: string
                repo:
                  type: string
                repoRoot:
                  type: string
                runtime:
                  type: string
                tasks:
                  type: array
                  items:
                    type: object
                    additionalProperties: false
                    required:
                      - title
                      - acceptance
                    properties:
                      id:
                        type: string
                      task_id:
                        type: string
                      title:
                        type: string
                      name:
                        type: string
                      type:
                        enum:
                          - coding
                          - general
                      status:
                        type: string
                      dependencies:
                        type: array
                        items:
                          type: string
                      depends_on:
                        type: array
                        items:
                          type: string
                      scope_files:
                        type: array
                        items:
                          type: string
                      scope:
                        type: array
                        items:
                          type: string
                      spec_refs:
                        type: array
                        items:
                          type: string
                      specs:
                        type: array
                        items:
                          type: string
                      context_refs:
                        type: array
                        items:
                          type: string
                      context:
                        type: array
                        items:
                          type: string
                      branch_ref:
                        type: string
                      worktree_path:
                        type: string
                      child_wtree:
                        type: string
                      concurrency_group:
                        type: string
                      merge_target:
                        type: string
                      merge_lease_id:
                        type: string
                      merge_commit:
                        type: string
                      system_impact_ref:
                        type: string
                      acceptance:
                        oneOf:
                          - type: string
                          - type: array
                            items:
                              type: string
                      acceptance_criteria:
                        oneOf:
                          - type: string
                          - type: array
                            items:
                              type: string
                question_rounds:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                plan_detail:
                  type: object
                  additionalProperties: true
                validation_receipt:
                  type: object
                  additionalProperties: true
                verification_receipt:
                  type: object
                  additionalProperties: true
                events:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                parent_wtree:
                  type: string
                coordinator_branch:
                  type: string
                coordinator_worktree:
                  type: string
                landing_target_branch:
                  type: string
                landing_target_worktree:
                  type: string
                requirements:
                  type: array
                  items:
                    type: string
            build:
              kind: js
              using:
                - inputs
                - state
                - env
              code: |-
                const quest = (state && state.steps && state.steps.read_tasks && state.steps.read_tasks.action) || {};
                const queriedEvents = (state && state.steps && state.steps.query_events && state.steps.query_events.action) || [];
                const array = (value) => Array.isArray(value) ? value : [];
                const object = (value) => value && typeof value === "object" && !Array.isArray(value) ? value : {};
                return {
                  schema_version: inputs.schema_version || "loopship.step.request/v1",
                  kind: inputs.kind || "quest_step_request",
                  wtree: String(inputs.wtree || quest.wtree || ""),
                  quest_id: String(inputs.quest_id || quest.quest_id || inputs.wtree || quest.wtree || ""),
                  flow_id: String(inputs.flow_id || quest.flow_id || "swe"),
                  flow_version: Number(inputs.flow_version || quest.flow_version || 1),
                  current_stage: String(inputs.current_stage || quest.stage || ""),
                  summary: String(inputs.summary || "Submit the result of a completed child quest back to the parent flow."),
                  prompt: String(inputs.prompt || quest.prompt || ""),
                  repo: String(inputs.repo || inputs.repoRoot || quest.context_root || env.PWD || ""),
                  repoRoot: String(inputs.repoRoot || inputs.repo || quest.context_root || env.PWD || ""),
                  runtime: String(inputs.runtime || ""),
                  tasks: array(inputs.tasks).length ? array(inputs.tasks) : array(quest.tasks),
                  question_rounds: array(inputs.question_rounds).length ? array(inputs.question_rounds) : array(quest.question_rounds),
                  plan_detail: Object.keys(object(inputs.plan_detail)).length ? object(inputs.plan_detail) : object(quest.plan_detail),
                  validation_receipt: Object.keys(object(inputs.validation_receipt)).length ? object(inputs.validation_receipt) : object(quest.validation_receipt),
                  verification_receipt: Object.keys(object(inputs.verification_receipt)).length ? object(inputs.verification_receipt) : object(quest.verification_receipt),
                  events: array(inputs.events).length ? array(inputs.events) : array(queriedEvents),
                  parent_wtree: String(inputs.parent_wtree || quest.parent_wtree || ""),
                  coordinator_branch: String(inputs.coordinator_branch || quest.coordinator_branch || ""),
                  coordinator_worktree: String(inputs.coordinator_worktree || quest.coordinator_worktree || ""),
                  landing_target_branch: String(inputs.landing_target_branch || quest.landing_target_branch || ""),
                  landing_target_worktree: String(inputs.landing_target_worktree || quest.landing_target_worktree || ""),
                  requirements: array(inputs.requirements)
                };
          answer:
            schema:
              "$schema": "https://json-schema.org/draft/2020-12/schema"
              "$id": schemas/steps/child-result-input.yaml
              title: "Loopship V3 Child Result Input"
              type: object
              additionalProperties: false
              required:
                - task_id
                - child_wtree
                - status
                - evidence
              allOf:
                - if:
                    properties:
                      status:
                        const: passed
                  then:
                    required:
                      - merge_commit
              properties:
                task_id:
                  type: string
                child_wtree:
                  type: string
                status:
                  enum:
                    - passed
                    - blocked
                    - failed
                evidence:
                  type: array
                  items:
                    type: object
                    additionalProperties: false
                    required:
                      - type
                      - ref
                    properties:
                      type:
                        type: string
                      ref:
                        type: string
                      summary:
                        type: string
                      status:
                        type: string
                branch_ref:
                  type: string
                worktree_path:
                  type: string
                merge_target:
                  type: string
                merge_lease_id:
                  type: string
                merge_commit:
                  type: string
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
output:
  schema:
    document:
      type: object
      additionalProperties: true
  as: "${state.steps.child_result.action}"
