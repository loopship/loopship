          wtree: "${inputs.wtree || inputs.quest?.wtree || ''}"
          quest: "${inputs.quest || {}}"
          children: "${Array.isArray(inputs.children) ? inputs.children : (inputs.task ? [inputs.task] : [inputs])}"
          runtime: "${inputs.runtime || ''}"
