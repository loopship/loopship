# Fastflow generated release artifact; do not edit directly.
# Edit the matching *.dev.yaml workflow and run the consumer Fastflow promotion flow.
document:
  dsl: 1.0.3
  namespace: service-flows
  name: swe
  version: 0.1.0
  summary: "Loopship SWE flow orchestration with Native durable supervision."
  metadata:
    catalog:
      tags:
        - loopship
        - flow
        - swe
    data:
      defaultAdapter: yaml
      adapters:
        yaml:
          rootDir: .
        json:
          rootDir: .
        jsonl:
          rootDir: .
    inference:
      groups:
        loopship_child_implementation:
          timeoutMs: 1200000
          "true":
            - unavailable
            - timeout
            - transport_error
            - invalid_json
            - invalid_output
            - abstain
          try:
            - llm.cli.codex.gpt-5.4-mini.max
            - aitl.subagent
        loopship_failure_repair:
          timeoutMs: 600000
          "true":
            - unavailable
            - timeout
            - transport_error
            - invalid_json
            - invalid_output
            - abstain
          try:
            - aitl.subagent
input:
  schema:
    document:
      type: object
      additionalProperties: true
do:
  - read_tasks:
      metadata:
        description: "Read the current Loopship task document through Fastflow workflow data."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.data.document.read
      with:
        body:
          namespace: .loopship/runtime
          adapter_config:
            rootDir: .
          adapter: yaml
          document: tasks
      output:
        schema:
          document:
            type:
              - object
              - "null"
            additionalProperties: true
        as: "${action.document}"
  - query_events:
      metadata:
        description: "Query the Loopship event log through Fastflow workflow data."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.data.event-log.query
      with:
        body:
          namespace: .loopship/runtime
          adapter_config:
            rootDir: .
          adapter: jsonl
          log: events
          limit: 25
      output:
        schema:
          document:
            type: array
            items:
              type: object
              additionalProperties: true
        as: "${action.events}"
  - resolve_stage:
      metadata:
        description: "Resolve the active Loopship flow stage from Fastflow workflow-data state."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      set:
        schema_version: loopship.flow-stage/v1
        flow_id: swe
        default_stage: planning
        current_stage: "${[\"planning\", \"awaiting_user_answers\", \"plan_review\", \"task_graph_ready\", \"executing\", \"validating\", \"verification_pending\", \"system_update_pending\", \"landing_ready\", \"replanning\", \"archived\"].includes(String(args.stage || args.state || state.steps.read_tasks?.action?.stage || \"planning\").trim()) ? String(args.stage || args.state || state.steps.read_tasks?.action?.stage || \"planning\").trim() : \"planning\"}"
        runtime:
          tasks: "${state.steps.read_tasks?.action || {}}"
          manifest: null
          events: "${state.steps.query_events?.action || []}"
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action.values}"
  - route_stage:
      metadata:
        description: "Route directly to the active Loopship flow stage."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      switch:
        - planning:
            when: "${state.steps.resolve_stage.action.current_stage === \"planning\"}"
            then: stage_planning
        - awaiting_user_answers:
            when: "${state.steps.resolve_stage.action.current_stage === \"awaiting_user_answers\"}"
            then: stage_awaiting_user_answers
        - plan_review:
            when: "${state.steps.resolve_stage.action.current_stage === \"plan_review\"}"
            then: stage_plan_review
        - task_graph_ready:
            when: "${state.steps.resolve_stage.action.current_stage === \"task_graph_ready\"}"
            then: validate_child_dag
        - executing:
            when: "${state.steps.resolve_stage.action.current_stage === \"executing\"}"
            then: stage_executing
        - validating:
            when: "${state.steps.resolve_stage.action.current_stage === \"validating\"}"
            then: stage_validating
        - verification_pending:
            when: "${state.steps.resolve_stage.action.current_stage === \"verification_pending\"}"
            then: stage_verification_pending
        - system_update_pending:
            when: "${state.steps.resolve_stage.action.current_stage === \"system_update_pending\"}"
            then: stage_system_update_pending
        - landing_ready:
            when: "${state.steps.resolve_stage.action.current_stage === \"landing_ready\"}"
            then: stage_landing_ready
        - replanning:
            when: "${state.steps.resolve_stage.action.current_stage === \"replanning\"}"
            then: stage_replanning
        - archived:
            when: "${state.steps.resolve_stage.action.current_stage === \"archived\"}"
            then: stage_archived
  - stage_planning:
      then: stage_result_planning
      metadata:
        description: "Run Loopship planning via the pinned plan step workflow."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
        ref:
          digest: "sha256:f096b7d9b41dcfbe346ba25a36d1985416eb144e5467b0dd3a01344542734cce"
      call: loopship.workflow.service.step.plan
      with:
        version: 0.1.0
        input:
          schema_version: loopship.step.request/v1
          kind: quest_step_request
          wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          quest_id: "${state.steps.read_tasks.action.quest_id || state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          flow_id: swe
          flow_version: 1
          current_stage: planning
          summary: "Submit a decision-complete plan payload with explicit system context. Ask or default every high-impact unknown."
          prompt: "${state.steps.read_tasks.action.prompt || inputs.request || ''}"
          repo: "${state.steps.read_tasks.action.coordinator_worktree || inputs.repo || inputs.repoRoot || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          repoRoot: "${inputs.repoRoot || inputs.repo || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          runtime: "${inputs.runtime || ''}"
          tasks: "${Array.isArray(state.steps.read_tasks.action.tasks) ? state.steps.read_tasks.action.tasks : []}"
          question_rounds: "${Array.isArray(state.steps.read_tasks.action.question_rounds) ? state.steps.read_tasks.action.question_rounds : []}"
          plan_detail: "${state.steps.read_tasks.action.plan_detail || {}}"
          validation_receipt: "${state.steps.read_tasks.action.validation_receipt || {}}"
          verification_receipt: "${state.steps.read_tasks.action.verification_receipt || {}}"
          events: "${Array.isArray(state.steps.query_events.action) ? state.steps.query_events.action : []}"
          parent_wtree: "${state.steps.read_tasks.action.parent_wtree || ''}"
          parent_task_id: "${state.steps.read_tasks.action.parent_task_id || ''}"
          parent_context_ref: "${state.steps.read_tasks.action.parent_context_ref || ''}"
          coordinator_branch: "${state.steps.read_tasks.action.coordinator_branch || ''}"
          coordinator_worktree: "${state.steps.read_tasks.action.coordinator_worktree || ''}"
          landing_target_branch: "${state.steps.read_tasks.action.landing_target_branch || 'main'}"
          landing_target_worktree: "${state.steps.read_tasks.action.landing_target_worktree || ''}"
          replan_reason: "${state.steps.read_tasks.action.replan_reason || ''}"
          requirements:
            - "Classify the request."
            - "Use repository discovery before asking questions."
            - "Use AF to surface contradictions, hidden assumptions, weak evidence, and edge cases."
            - "Use OF to collapse scope, defaults, acceptance, decomposition, and verification targets."
            - "For greenfield app/product work, ask or explicitly default every high-impact unknown before task graph approval."
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - stage_awaiting_user_answers:
      then: stage_result_awaiting_user_answers
      metadata:
        description: "Run Loopship awaiting_user_answers via the pinned questions step workflow."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
        ref:
          digest: "sha256:47c9130205d673c021e5300004abc3997a26b9ecbcca84a03df4cfb76994ac3a"
      call: loopship.workflow.service.step.questions
      with:
        version: 0.1.0
        input:
          schema_version: loopship.step.request/v1
          kind: quest_step_request
          wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          quest_id: "${state.steps.read_tasks.action.quest_id || state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          flow_id: swe
          flow_version: 1
          current_stage: awaiting_user_answers
          summary: "Submit grouped user answers for the current clarification round."
          prompt: "${state.steps.read_tasks.action.prompt || inputs.request || ''}"
          repo: "${state.steps.read_tasks.action.coordinator_worktree || inputs.repo || inputs.repoRoot || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          repoRoot: "${inputs.repoRoot || inputs.repo || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          runtime: "${inputs.runtime || ''}"
          tasks: "${Array.isArray(state.steps.read_tasks.action.tasks) ? state.steps.read_tasks.action.tasks : []}"
          question_rounds: "${Array.isArray(state.steps.read_tasks.action.question_rounds) ? state.steps.read_tasks.action.question_rounds : []}"
          plan_detail: "${state.steps.read_tasks.action.plan_detail || {}}"
          validation_receipt: "${state.steps.read_tasks.action.validation_receipt || {}}"
          verification_receipt: "${state.steps.read_tasks.action.verification_receipt || {}}"
          events: "${Array.isArray(state.steps.query_events.action) ? state.steps.query_events.action : []}"
          parent_wtree: "${state.steps.read_tasks.action.parent_wtree || ''}"
          coordinator_branch: "${state.steps.read_tasks.action.coordinator_branch || ''}"
          coordinator_worktree: "${state.steps.read_tasks.action.coordinator_worktree || ''}"
          landing_target_branch: "${state.steps.read_tasks.action.landing_target_branch || 'main'}"
          landing_target_worktree: "${state.steps.read_tasks.action.landing_target_worktree || ''}"
          requirements: []
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - stage_plan_review:
      then: stage_result_plan_review
      metadata:
        description: "Run Loopship plan_review via the pinned task_graph step workflow."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
        ref:
          digest: "sha256:9a472cf0a486669e8d9afb7fdc48ba9b83c8844af3a0a5594bf735ed2f80d45f"
      call: loopship.workflow.service.step.task-graph
      with:
        version: 0.1.0
        input:
          schema_version: loopship.step.request/v1
          kind: quest_step_request
          wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          quest_id: "${state.steps.read_tasks.action.quest_id || state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          flow_id: swe
          flow_version: 1
          current_stage: plan_review
          summary: "Approve or reject the generated task graph, including a replan reason when rejected."
          prompt: "${state.steps.read_tasks.action.prompt || inputs.request || ''}"
          repo: "${inputs.repo || inputs.repoRoot || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          repoRoot: "${inputs.repoRoot || inputs.repo || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          runtime: "${inputs.runtime || ''}"
          tasks: "${Array.isArray(state.steps.read_tasks.action.tasks) ? state.steps.read_tasks.action.tasks : []}"
          question_rounds: "${Array.isArray(state.steps.read_tasks.action.question_rounds) ? state.steps.read_tasks.action.question_rounds : []}"
          plan_detail: "${state.steps.read_tasks.action.plan_detail || {}}"
          validation_receipt: "${state.steps.read_tasks.action.validation_receipt || {}}"
          verification_receipt: "${state.steps.read_tasks.action.verification_receipt || {}}"
          events: "${Array.isArray(state.steps.query_events.action) ? state.steps.query_events.action : []}"
          parent_wtree: "${state.steps.read_tasks.action.parent_wtree || ''}"
          coordinator_branch: "${state.steps.read_tasks.action.coordinator_branch || ''}"
          coordinator_worktree: "${state.steps.read_tasks.action.coordinator_worktree || ''}"
          landing_target_branch: "${state.steps.read_tasks.action.landing_target_branch || 'main'}"
          landing_target_worktree: "${state.steps.read_tasks.action.landing_target_worktree || ''}"
          requirements: []
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - validate_child_dag:
      then: child_dag_validation_route
      metadata:
        description: "Normalize the approved child rows and reject unordered scope or concurrency conflicts before binding."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_child_dag_validation_contract
              kind: behaviour
              statement: "Child DAG validation returns canonical tasks and one finite concurrency ceiling."
              check:
                script:
                  kind: js
                  code: |
                    return {
                      ok: typeof action?.ok === "boolean" && Number.isInteger(action?.max_concurrency),
                      evidence: { ok: action?.ok, max_concurrency: action?.max_concurrency }
                    };
      call: loopship.afn.service.child.validate-dag
      with:
        body:
          tasks: "${Array.isArray(state.steps.read_tasks.action.tasks) ? state.steps.read_tasks.action.tasks : []}"
          max_concurrency: "${inputs.maxConcurrency === undefined ? 4 : inputs.maxConcurrency}"
          supervise_step: "${state.steps.read_tasks.action.supervise_step === true}"
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - child_dag_validation_route:
      metadata:
        description: "Bind only valid child DAGs; invalid task graphs return to replanning without hidden edges."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_child_dag_validation_route
              kind: behaviour
              statement: "Invalid child resource conflicts never enter Native dispatch."
              check:
                script:
                  kind: js
                  code: |
                    return { ok: Boolean(action?.matched_case), evidence: { matched_case: action?.matched_case || "" } };
      switch:
        - valid:
            when: "${state.steps.validate_child_dag.action.ok === true}"
            then: stage_task_graph_ready
        - invalid:
            then: stage_result_child_dag_invalid
  - stage_task_graph_ready:
      then: stage_result_task_graph_ready
      for:
        in: "${state.steps.validate_child_dag.action.tasks}"
        each: childTask
        at: childIndex
      do:
        - prepare_child:
            then: run_child_lifecycle
            metadata:
              description: "Prepare one child worktree only when its Native DAG node becomes ready."
              validation:
                post:
                  kind: static
                  ok: true
              verification:
                assertions:
                  - id: loopship_native_child_prepared
                    kind: behaviour
                    statement: "One ready node prepares exactly one stable child identity without command emission."
                    check:
                      script:
                        kind: js
                        code: |
                          return {
                            ok: action?.count === 1 && !action?.actions,
                            evidence: { task_id: action?.task_id || "", child_wtree: action?.child_wtree || "" }
                          };
            call: loopship.afn.service.child.prepare-worktree
            with:
              body:
                repo: "${inputs.repo || inputs.repoRoot || state.steps.read_tasks.action.context_root || env.PWD || ''}"
                wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
                quest: "${state.steps.read_tasks.action || {}}"
                task: "${state.vars.childTask}"
                runtime: "${inputs.runtime || ''}"
                target_branch: "${state.steps.read_tasks.action.coordinator_branch || state.steps.read_tasks.action.wtree || ''}"
                target_worktree: "${state.steps.read_tasks.action.coordinator_worktree || ''}"
                supervise_step: "${state.steps.read_tasks.action.supervise_step === true}"
            output:
              schema:
                document:
                  type: object
                  additionalProperties: true
              as: "${action}"
        - run_child_lifecycle:
            metadata:
              description: "Execute the prepared terminal child through the pinned Native child lifecycle."
              ref:
                  digest: "sha256:45855d66c1d31ee4ebab26ef6f8073c450e1a05053a99e79d2ec53f9457b3daf"
              validation:
                post:
                  kind: static
                  ok: true
              verification:
                assertions:
                  - id: loopship_native_child_lifecycle
                    kind: behaviour
                    statement: "A passed child node returns a stable landed and archived receipt."
                    check:
                      script:
                        kind: js
                        code: |
                          return {
                            ok: action?.status === "child_archived" && Boolean(action?.merge_commit),
                            evidence: action || {}
                          };
            call: loopship.workflow.service.flows.swe-child
            with:
              version: 0.1.0
              input:
                prepared: "${state.steps.prepare_child.action}"
            output:
              schema:
                document:
                  type: object
                  additionalProperties: true
              as: "${action.result.output}"
      metadata:
        description: "Execute the approved child graph as one immutable finite Native DAG."
        extensions:
          fastflow:
            schemaVersion: fastflow.task/v2
            dag:
              id: "${state.vars.childTask.id}"
              dependsOn: "${state.vars.childTask.dependencies || []}"
              maxConcurrency: "${state.steps.validate_child_dag.action.max_concurrency}"
              join: all_settled
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_child_dag_settled
              kind: behaviour
              statement: "The Native all-settled aggregate retains one input-ordered outcome per approved child task."
              check:
                script:
                  kind: js
                  code: |
                    const nodes = Array.isArray(action?.scheduler?.nodes) ? action.scheduler.nodes : [];
                    return {
                      ok: action?.scheduler?.schemaVersion === "fastflow.scheduler.result/v2" && nodes.length === action?.count,
                      evidence: { count: action?.count || 0, node_count: nodes.length }
                    };
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - stage_result_child_dag_invalid:
      then: select_stage_result
      metadata:
        description: "Return invalid child graphs to replanning without creating implicit serialization edges."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_invalid_child_dag_replans
              kind: behaviour
              statement: "Unordered child conflicts persist a concrete replan reason."
              check:
                script:
                  kind: js
                  code: |
                    return { ok: action?.stage_after === "replanning", evidence: action || {} };
      run:
        script:
          language: js
          code: |
            const validation = state.steps.validate_child_dag?.action || {};
            const errors = Array.isArray(validation.errors) ? validation.errors : [];
            const reason = errors.join("; ") || "invalid Native child DAG";
            return {
              schema_version: "loopship.stage-result.build/v1",
              flow_id: "swe",
              stage_before: "task_graph_ready",
              stage_after: "replanning",
              transition: "rejected",
              step: "executing",
              step_workflow_task: "stage_result_child_dag_invalid",
              step_payload: validation,
              step_action: validation,
              state_patch: { stage: "replanning", replan_reason: reason },
              events: [{ event: "child_dag_rejected", stage: "replanning", errors }],
              runtime: state.steps.resolve_stage?.action?.runtime || {}
            };
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action.value}"
  - stage_executing:
      metadata:
        description: "Reject persisted coordinator executions from the removed external child-dispatch lifecycle."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_legacy_execution_rejected
              kind: behaviour
              statement: "Legacy coordinator execution state fails closed and must be resubmitted."
              check:
                script:
                  kind: js
                  code: |
                    return { ok: false, evidence: { code: "legacy_execution_unsupported" } };
      run:
        script:
          language: js
          code: |
            const error = new Error(
              "legacy_execution_unsupported: coordinator child-dispatch state cannot resume; resubmit as a new Native DAG execution"
            );
            error.code = "legacy_execution_unsupported";
            throw error;
  - stage_validating:
      then: stage_result_validating
      metadata:
        description: "Run Loopship validating via the pinned validation step workflow."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
        ref:
          digest: "sha256:d41941f303b7d3fe31c083008005581ff914005dc2d25b92f139f6d4ee32d4fd"
      call: loopship.workflow.service.step.validation
      with:
        version: 0.1.0
        input:
          schema_version: loopship.step.request/v1
          kind: quest_step_request
          wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          quest_id: "${state.steps.read_tasks.action.quest_id || state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          flow_id: swe
          flow_version: 1
          current_stage: validating
          summary: "Submit deterministic validation results only, including schemas, DAG, tests, build, lint/typecheck, manifest, and behavior refs."
          prompt: "${state.steps.read_tasks.action.prompt || inputs.request || ''}"
