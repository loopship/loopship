              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
        ref:
          digest: "sha256:2aaccc0a7fec622d5bc63f81f5d4cd5b19733cff821e8fa5609d28f75cfc8a75"
