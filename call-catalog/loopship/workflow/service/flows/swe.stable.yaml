document:
  dsl: 1.0.3
  namespace: service-flows
  name: swe
  version: 0.1.0
  summary: "Loopship swe flow orchestration for Fastflow-native supervision."
  metadata:
    catalog:
      tags:
        - loopship
        - flow
        - swe
    data:
      defaultAdapter: yaml
      adapters:
        yaml:
          rootDir: .
        json:
          rootDir: .
        jsonl:
          rootDir: .
input:
  schema:
    document:
      type: object
      additionalProperties: true
do:
  - read_tasks:
      metadata:
        description: "Read the current Loopship task document through Fastflow workflow data."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.data.document.read
      with:
        body:
          namespace: .loopship/runtime
          adapter_config:
            rootDir: .
          adapter: yaml
          document: tasks
      output:
        schema:
          document:
            type:
              - object
              - "null"
            additionalProperties: true
        as: "${action.document}"
  - query_events:
      metadata:
        description: "Query the Loopship event log through Fastflow workflow data."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.data.event-log.query
      with:
        body:
          namespace: .loopship/runtime
          adapter_config:
            rootDir: .
          adapter: jsonl
          log: events
          limit: 25
      output:
        schema:
          document:
            type: array
            items:
              type: object
              additionalProperties: true
        as: "${action.events}"
  - resolve_stage:
      metadata:
        description: "Resolve the active Loopship flow stage from Fastflow workflow-data state."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      run:
        script:
          language: js
          code: |-
            const validStages = new Set([
              "planning",
              "awaiting_user_answers",
              "plan_review",
              "task_graph_ready",
              "executing",
              "validating",
              "verification_pending",
              "system_update_pending",
              "landing_ready",
              "replanning",
              "archived",
            ]);
            const tasks = state.steps.read_tasks?.action || {};
            const requestedStage = String(args.stage || args.state || tasks.stage || "planning").trim();
            const currentStage = validStages.has(requestedStage) ? requestedStage : "planning";
            return {
              schema_version: "loopship.flow-stage/v1",
              flow_id: "swe",
              default_stage: "planning",
              current_stage: currentStage,
              runtime: {
                tasks,
                manifest: null,
                events: state.steps.query_events?.action || []
              }
            };
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action.value}"
  - route_stage:
      metadata:
        description: "Route directly to the active Loopship flow stage."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      switch:
        - planning:
            when: "${state.steps.resolve_stage.action.current_stage === \"planning\"}"
            then: stage_planning
        - awaiting_user_answers:
            when: "${state.steps.resolve_stage.action.current_stage === \"awaiting_user_answers\"}"
            then: stage_awaiting_user_answers
        - plan_review:
            when: "${state.steps.resolve_stage.action.current_stage === \"plan_review\"}"
            then: stage_plan_review
        - task_graph_ready:
            when: "${state.steps.resolve_stage.action.current_stage === \"task_graph_ready\"}"
            then: stage_task_graph_ready
        - executing_leaf:
            when: "${state.steps.resolve_stage.action.current_stage === \"executing\" && Array.isArray(state.steps.read_tasks.action.tasks) && state.steps.read_tasks.action.tasks.length > 0 && state.steps.read_tasks.action.tasks.every((task) => !String((task || {}).child_wtree || \"\").trim())}"
            then: stage_leaf_git_head
        - executing:
            when: "${state.steps.resolve_stage.action.current_stage === \"executing\"}"
            then: stage_executing
        - validating:
            when: "${state.steps.resolve_stage.action.current_stage === \"validating\"}"
            then: stage_validating
        - verification_pending:
            when: "${state.steps.resolve_stage.action.current_stage === \"verification_pending\"}"
            then: stage_verification_pending
        - system_update_pending:
            when: "${state.steps.resolve_stage.action.current_stage === \"system_update_pending\"}"
            then: stage_system_update_pending
        - landing_ready:
            when: "${state.steps.resolve_stage.action.current_stage === \"landing_ready\"}"
            then: stage_landing_ready
        - replanning:
            when: "${state.steps.resolve_stage.action.current_stage === \"replanning\"}"
            then: stage_replanning
        - archived:
            when: "${state.steps.resolve_stage.action.current_stage === \"archived\"}"
            then: stage_archived
  - stage_planning:
      then: stage_result_planning
      metadata:
        description: "Run Loopship planning via the pinned plan step workflow."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
        ref:
          digest: "sha256:effbf3ae89c4c5ce0c6b8d9e85b2cc28e569b32d08b7dd94a45a7886c5cfbefe"
      call: loopship.workflow.service.step.plan
      with:
        version: 0.1.0
        input:
          schema_version: loopship.step.request/v1
          kind: quest_step_request
          wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          quest_id: "${state.steps.read_tasks.action.quest_id || state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          flow_id: swe
          flow_version: 1
          current_stage: planning
          summary: "Submit a decision-complete plan payload with explicit system context. Ask or default every high-impact unknown."
          prompt: "${state.steps.read_tasks.action.prompt || inputs.request || ''}"
          repo: "${inputs.repo || inputs.repoRoot || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          repoRoot: "${inputs.repoRoot || inputs.repo || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          runtime: "${inputs.runtime || ''}"
          tasks: "${Array.isArray(state.steps.read_tasks.action.tasks) ? state.steps.read_tasks.action.tasks : []}"
          question_rounds: "${Array.isArray(state.steps.read_tasks.action.question_rounds) ? state.steps.read_tasks.action.question_rounds : []}"
          plan_detail: "${state.steps.read_tasks.action.plan_detail || {}}"
          validation_receipt: "${state.steps.read_tasks.action.validation_receipt || {}}"
          verification_receipt: "${state.steps.read_tasks.action.verification_receipt || {}}"
          events: "${Array.isArray(state.steps.query_events.action) ? state.steps.query_events.action : []}"
          parent_wtree: "${state.steps.read_tasks.action.parent_wtree || ''}"
          parent_task_id: "${state.steps.read_tasks.action.parent_task_id || ''}"
          parent_context_ref: "${state.steps.read_tasks.action.parent_context_ref || ''}"
          coordinator_branch: "${state.steps.read_tasks.action.coordinator_branch || ''}"
          coordinator_worktree: "${state.steps.read_tasks.action.coordinator_worktree || ''}"
          landing_target_branch: "${state.steps.read_tasks.action.landing_target_branch || 'main'}"
          landing_target_worktree: "${state.steps.read_tasks.action.landing_target_worktree || ''}"
          replan_reason: "${state.steps.read_tasks.action.replan_reason || ''}"
          requirements:
            - "Classify the request."
            - "Use repository discovery before asking questions."
            - "Use AF to surface contradictions, hidden assumptions, weak evidence, and edge cases."
            - "Use OF to collapse scope, defaults, acceptance, decomposition, and verification targets."
            - "For greenfield app/product work, ask or explicitly default every high-impact unknown before task graph approval."
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - stage_awaiting_user_answers:
