          wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          quest_id: "${state.steps.read_tasks.action.quest_id || state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          flow_id: swe
          flow_version: 1
          current_stage: plan_review
          summary: "Approve or reject the generated task graph, including a replan reason when rejected."
          prompt: "${state.steps.read_tasks.action.prompt || inputs.request || ''}"
          repo: "${inputs.repo || inputs.repoRoot || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          repoRoot: "${inputs.repoRoot || inputs.repo || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          runtime: "${inputs.runtime || ''}"
          tasks: "${Array.isArray(state.steps.read_tasks.action.tasks) ? state.steps.read_tasks.action.tasks : []}"
          question_rounds: "${Array.isArray(state.steps.read_tasks.action.question_rounds) ? state.steps.read_tasks.action.question_rounds : []}"
          plan_detail: "${state.steps.read_tasks.action.plan_detail || {}}"
          validation_receipt: "${state.steps.read_tasks.action.validation_receipt || {}}"
          verification_receipt: "${state.steps.read_tasks.action.verification_receipt || {}}"
          events: "${Array.isArray(state.steps.query_events.action) ? state.steps.query_events.action : []}"
          parent_wtree: "${state.steps.read_tasks.action.parent_wtree || ''}"
          coordinator_branch: "${state.steps.read_tasks.action.coordinator_branch || ''}"
          coordinator_worktree: "${state.steps.read_tasks.action.coordinator_worktree || ''}"
          landing_target_branch: "${state.steps.read_tasks.action.landing_target_branch || 'main'}"
