document:
  dsl: 1.0.3
  namespace: service-flows
  name: swe
  version: 0.1.0
  summary: "Loopship swe flow orchestration for Fastflow-native supervision."
  metadata:
    catalog:
      tags:
        - loopship
        - flow
        - swe
    data:
      defaultAdapter: yaml
      adapters:
        yaml:
          rootDir: .
        json:
          rootDir: .
        jsonl:
          rootDir: .
input:
  schema:
    document:
      type: object
      additionalProperties: true
do:
  - read_tasks:
      metadata:
        description: "Read the current Loopship task document through Fastflow workflow data."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.data.document.read
      with:
        body:
          namespace: .loopship/runtime
          adapter_config:
            rootDir: .
          adapter: yaml
          document: tasks
      output:
        schema:
          document:
            type:
              - object
              - "null"
            additionalProperties: true
        as: "${action.document}"
  - query_events:
      metadata:
        description: "Query the Loopship event log through Fastflow workflow data."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.data.event-log.query
      with:
        body:
          namespace: .loopship/runtime
          adapter_config:
            rootDir: .
          adapter: jsonl
          log: events
          limit: 25
      output:
        schema:
          document:
            type: array
            items:
              type: object
              additionalProperties: true
        as: "${action.events}"
  - resolve_stage:
      metadata:
        description: "Resolve the active Loopship flow stage from Fastflow workflow-data state."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      run:
        script:
          language: js
          code: |-
            const flow = {"id":"swe","default_stage":"planning","stages":[{"id":"planning","step":"plan","transitions":{"questions":"awaiting_user_answers","planned":"plan_review"},"transition_key":null},{"id":"awaiting_user_answers","step":"questions","transitions":{"answered":"planning"},"transition_key":null},{"id":"plan_review","step":"task_graph","transitions":{"approved":"task_graph_ready","child_approved":"validating","rejected":"planning"},"transition_key":null},{"id":"task_graph_ready","step":"executing","transitions":{"complete":"validating","partial":"executing"},"transition_key":null},{"id":"executing","step":"child_result","transitions":{"complete":"validating","partial":"executing"},"transition_key":null},{"id":"validating","step":"validation","transitions":{"passed":"verification_pending","failed":"task_graph_ready","failed_child":"validating"},"transition_key":null},{"id":"verification_pending","step":"verification","transitions":{"passed":"system_update_pending","failed":"validating"},"transition_key":null},{"id":"system_update_pending","step":"system_update","transitions":{"updated":"landing_ready"},"transition_key":null},{"id":"landing_ready","step":"landing","transitions":{"landed":"archived","blocked":"landing_ready"},"transition_key":null},{"id":"replanning","step":"plan","transitions":{"planned":"plan_review","questions":"awaiting_user_answers"},"transition_key":null},{"id":"archived","step":"archived","transitions":{},"transition_key":null}],"subflows":[{"id":"replanning","type":"in_flow_detour","starts_at":"replanning","returns_to":"plan_review","trigger":"replan"},{"id":"add_task","type":"in_flow_detour","starts_at":"replanning","returns_to":"task_graph_ready","trigger":"add_task"},{"id":"child_task","type":"spawned_quest","starts_at":"task_graph_ready","returns_to":"executing","trigger":"children[].actions.init","result_step":"child_result","flow_id":"swe"}]};
            const tasks = state.steps.read_tasks?.action || {};
            const requestedStage = String(args.stage || args.state || tasks.stage || flow.default_stage || "").trim();
            const stage = flow.stages.find((item) => item.id === requestedStage) ||
              flow.stages.find((item) => item.id === flow.default_stage);
            const inputStepByStage = {"planning":"plan","awaiting_user_answers":"questions","plan_review":"task_graph","task_graph_ready":"executing","executing":"child_result","validating":"validation","verification_pending":"verification","system_update_pending":"system_update","landing_ready":"landing","replanning":"plan","archived":"archived"};
            return {
              schema_version: "loopship.flow-stage/v1",
              flow_id: flow.id,
              default_stage: flow.default_stage,
              current_stage: stage.id,
              current_step: stage.step,
              expected_input_step: inputStepByStage[stage.id] || stage.step,
              transitions: stage.transitions || {},
              runtime: {
                tasks,
                manifest: null,
                events: state.steps.query_events?.action || []
              }
            };
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action.value}"
  - route_stage:
      metadata:
        description: "Route directly to the active Loopship flow stage."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
