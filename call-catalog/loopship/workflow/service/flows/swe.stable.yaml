          code: |-
            function object(value) { return value && typeof value === "object" && !Array.isArray(value) ? value : {}; }
            function runtimeSnapshot() { const resolved = object(state.steps.resolve_stage?.action); return resolved.runtime || { tasks: object(state.steps.read_tasks?.action), manifest: null, events: state.steps.query_events?.action || [] }; }
            const stageAction = object(state.steps.stage_archived?.action);
            const event = { event: "step_submitted", stage: "archived", step: "archived" };
            return { schema_version: "loopship.stage-result.build/v1", flow_id: "swe", stage_before: "archived", stage_after: "archived", transition: "complete", step: "archived", step_workflow_task: "stage_archived", step_payload: stageAction, step_action: stageAction, state_patch: { stage: "archived" }, events: [event], runtime: runtimeSnapshot() };
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action.value}"
  - select_stage_result:
      then: build_stage_result
      metadata:
        description: "Select the current Loopship stage result before composing the durable transition."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The current stage result is selected without reusing stale inline-loop state."
              check:
                script:
                  kind: js
                  code: |
                    const selected = action?.values?.selected_result || action?.selected_result || action || {};
                    const ok = Object.keys(selected).length > 0;
                    return { ok, evidence: { has_action: ok, stage_before: String(selected.stage_before || "") } };
      set:
        selected_result: "${({ planning: state.steps.stage_result_planning?.action, awaiting_user_answers: state.steps.stage_result_awaiting_user_answers?.action, plan_review: state.steps.stage_result_plan_review?.action, task_graph_ready: state.steps.stage_result_task_graph_ready?.action || state.steps.stage_result_child_dag_invalid?.action, validating: state.steps.stage_result_validating?.action, verification_pending: state.steps.stage_result_verification_pending?.action, system_update_pending: state.steps.stage_result_system_update_pending?.action, landing_ready: state.steps.stage_result_landing_ready?.action, replanning: state.steps.stage_result_replanning?.action, archived: state.steps.stage_result_archived?.action })[String(state.steps.resolve_stage?.action?.current_stage || \"planning\")] || {}}"
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action.values.selected_result}"
  - build_stage_result:
      then: persist_stage
      metadata:
        description: "Build the standard Loopship stage-result envelope from flow-owned transition data."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                call: loopship.afn.service.flow.compose-transition-result
                with:
                  body:
                    schema_version: "${(state.steps.select_stage_result?.action || {}).schema_version || \"loopship.stage-result.build/v1\"}"
                    flow_id: "${(state.steps.select_stage_result?.action || {}).flow_id || \"swe\"}"
                    stage_before: "${(state.steps.select_stage_result?.action || {}).stage_before || \"planning\"}"
                    stage_after: "${(state.steps.select_stage_result?.action || {}).stage_after || \"planning\"}"
                    transition: "${(state.steps.select_stage_result?.action || {}).transition || \"pending\"}"
                    step: "${(state.steps.select_stage_result?.action || {}).step || \"unknown\"}"
                    step_workflow_task: "${(state.steps.select_stage_result?.action || {}).step_workflow_task || \"build_stage_result\"}"
                    step_payload: "${(state.steps.select_stage_result?.action || {}).step_payload || {}}"
                    step_action: "${(state.steps.select_stage_result?.action || {}).step_action || {}}"
                    state_patch: "${(state.steps.select_stage_result?.action || {}).state_patch || {}}"
                    events: "${(state.steps.select_stage_result?.action || {}).events || []}"
                    runtime: "${(state.steps.select_stage_result?.action || {}).runtime || {}}"
                    as_check: true
      call: loopship.afn.service.flow.compose-transition-result
      with:
        body:
          schema_version: "${(state.steps.select_stage_result?.action || {}).schema_version || \"loopship.stage-result.build/v1\"}"
          flow_id: "${(state.steps.select_stage_result?.action || {}).flow_id || \"swe\"}"
          stage_before: "${(state.steps.select_stage_result?.action || {}).stage_before || \"planning\"}"
          stage_after: "${(state.steps.select_stage_result?.action || {}).stage_after || \"planning\"}"
          transition: "${(state.steps.select_stage_result?.action || {}).transition || \"pending\"}"
          step: "${(state.steps.select_stage_result?.action || {}).step || \"unknown\"}"
          step_workflow_task: "${(state.steps.select_stage_result?.action || {}).step_workflow_task || \"build_stage_result\"}"
          step_payload: "${(state.steps.select_stage_result?.action || {}).step_payload || {}}"
          step_action: "${(state.steps.select_stage_result?.action || {}).step_action || {}}"
          state_patch: "${(state.steps.select_stage_result?.action || {}).state_patch || {}}"
          events: "${(state.steps.select_stage_result?.action || {}).events || []}"
          runtime: "${(state.steps.select_stage_result?.action || {}).runtime || {}}"
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - persist_stage:
      then: append_stage_event
      metadata:
        description: "Persist the Fastflow-derived Loopship stage through workflow data."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.data.document.patch
      with:
        body:
          namespace: .loopship/runtime
          adapter_config:
            rootDir: .
          adapter: yaml
          document: tasks
          patch: "${state.steps.build_stage_result?.action?.state_patch || {}}"
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - append_stage_event:
      then: commit_quest_state
      metadata:
        description: "Append the Fastflow-derived stage transition event through workflow data."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.data.event-log.append
      with:
        body:
          namespace: .loopship/runtime
          adapter_config:
            rootDir: .
          adapter: jsonl
          log: events
          events: "${state.steps.build_stage_result?.action?.events || []}"
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - commit_quest_state:
      then: continue_or_stop
      metadata:
        description: "Commit the workflow-data tasks and event mutations to the canonical quest manifest."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_quest_manifest_committed
              kind: behaviour
              statement: "The canonical quest manifest covers the persisted tasks and event log."
              check:
                call: loopship.afn.service.runtime.commit-quest-state
                with:
                  body:
                    repo: "${inputs.repoRoot || inputs.repo || state.steps.read_tasks.action.context_root || env.PWD || ''}"
                    wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
                    as_check: true
      call: loopship.afn.service.runtime.commit-quest-state
      with:
        body:
          repo: "${inputs.repoRoot || inputs.repo || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - continue_or_stop:
      metadata:
        description: "Continue inline Loopship lifecycle stages until a handoff, blocked state, or archive terminal state."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_continuation_contract
              kind: behaviour
              statement: "Inline lifecycle stages continue inside the same Fastflow run, while explicit handoff and blocked states stop."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action && action.ok === true;
                    return { ok, evidence: { matched_case: action?.matched_case || "" } };
      switch:
        - archived:
            when: "${String(state.steps.build_stage_result?.action?.stage_after || '') === 'archived'}"
            then: cleanup_landed_worktrees
        - awaiting_user_answers:
            when: "${String(state.steps.build_stage_result?.action?.stage_after || '') === 'awaiting_user_answers'}"
            then: end
        - blocked_execution:
            when: "${String(state.steps.build_stage_result?.action?.transition || '') === 'blocked'}"
            then: end
        - failed_transition:
            when: "${String(state.steps.build_stage_result?.action?.transition || '') === 'failed'}"
            then: stage_failure_repair_handoff
        - continue_inline:
            then: read_tasks
  - stage_failure_repair_handoff:
      then: read_tasks
      metadata:
        description: "Hand a failed validation or verification transition to an AITL repair agent before continuing from canonical state."
        inference: loopship_failure_repair
        validation:
          post:
            kind: js
            expression: |
              return {
                ok: Boolean(state?.steps?.stage_failure_repair_handoff?.action?.decision),
                evidence: { waiting_for_repair: true }
              };
        verification:
          assertions:
            - id: loopship_failure_repair_handoff_contract
              kind: behaviour
              statement: "Failed lifecycle transitions pause for an explicit AITL repair handoff instead of ending silently."
              check:
                call: loopship.afn.service.flow.compose-transition-result
                with:
                  body:
                    schema_version: loopship.stage-result.build/v1
                    flow_id: swe
                    stage_before: validating
                    stage_after: validating
                    transition: failed
                    step: failure_repair
                    step_workflow_task: stage_failure_repair_handoff
                    step_payload: {}
                    step_action: {}
                    state_patch: {}
                    events:
                      - event: failure_repair_handoff_check
                    runtime: {}
                    as_check: true
      call: fastflow.afn.core.request.input
      with:
        body:
          timeout_ms: 600000
          instruction: |-
            # Loopship Failed-Transition Repair
            Act as the assigned AITL repair agent for the current Loopship
            worktree. Inspect the failed validation or verification result,
            canonical task state, receipts, git state, and relevant checks.
            Repair task-owned defects and commit task-owned changes when needed.
            Do not edit canonical `.loopship/runtime` state directly, do not
            create nested child worktrees, and do not merge or land manually.
            If the failure is unrelated, pre-existing, or environment-only,
            verify that claim and return evidence without changing product code.
            Return the schema-valid repair receipt; Fastflow will re-read
            canonical state and continue validation inline after resume.
          request:
            schema:
              type: object
              additionalProperties: true
            build:
              kind: js
              using:
                - inputs
                - state
              code: |
                const tasks = state?.steps?.read_tasks?.action || {};
                return {
                  repo: String(inputs.repo || inputs.repoRoot || tasks.context_root || ""),
                  coordinator_worktree: String(tasks.coordinator_worktree || ""),
                  coordinator_branch: String(tasks.coordinator_branch || ""),
                  parent_context_ref: String(tasks.parent_context_ref || ""),
                  tasks: Array.isArray(tasks.tasks) ? tasks.tasks : [],
                  validation_receipt: tasks.validation_receipt || {},
                  verification_receipt: tasks.verification_receipt || {},
                  failed_transition: state?.steps?.build_stage_result?.action || {}
                };
          answer:
            schema:
              type: object
              additionalProperties: false
              required:
                - repair_receipt
              properties:
                repair_receipt:
                  type: object
                  additionalProperties: false
                  required:
                    - resolver
                    - agent_id
                    - thread_id
                    - worktree_path
                    - status
                    - summary
                    - checks
                  properties:
                    resolver:
                      const: aitl.subagent
                    agent_id:
                      type: string
                      minLength: 1
                    thread_id:
                      type: string
                      minLength: 1
                    worktree_path:
                      type: string
                      minLength: 1
                    status:
                      enum:
                        - repaired
                        - no_change
                        - blocked
                    summary:
                      type: string
                      minLength: 1
                    commits:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    checks:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - status
                        properties:
                          name:
                            type: string
                            minLength: 1
                          status:
                            enum:
                              - passed
                              - failed
                              - skipped
                          summary:
                            type: string
                          ref:
                            type: string
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - cleanup_landed_worktrees:
      if: "${String(state.steps.build_stage_result?.action?.stage_after || '') === 'archived'}"
      metadata:
        description: "Clean landed Loopship worktrees and branches after archived state and event evidence are durable."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_cleanup_contract
              kind: behaviour
              statement: "Cleanup runs only after archive persistence has produced durable landing evidence."
              check:
                call: loopship.afn.service.flow.compose-transition-result
                with:
                  body:
                    schema_version: loopship.stage-result.build/v1
                    flow_id: swe
                    stage_before: archived
                    stage_after: archived
                    transition: cleanup_check
                    step: archived
                    step_workflow_task: cleanup_landed_worktrees
                    step_payload: {}
                    step_action: {}
                    state_patch: {}
                    events:
                      - event: cleanup_landed_worktrees_check
                    runtime: {}
                    as_check: true
      call: loopship.afn.service.landing.cleanup-landed-worktrees
      with:
        body:
          repo: "${inputs.repo || inputs.repoRoot || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
output:
  schema:
    document:
      type: object
      additionalProperties: true
  as: "${state.steps.build_stage_result?.action || {}}"
