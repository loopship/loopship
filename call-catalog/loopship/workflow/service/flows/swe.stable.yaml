# Fastflow generated release artifact; do not edit directly.
# Edit the matching *.dev.yaml workflow and run the consumer Fastflow promotion flow.
document:
  dsl: 1.0.3
  namespace: service-flows
  name: swe
  version: 0.1.0
  summary: "Loopship SWE flow orchestration with Native durable supervision."
  metadata:
    catalog:
      tags:
        - loopship
        - flow
        - swe
    data:
      defaultAdapter: yaml
      adapters:
        yaml:
          rootDir: .
        json:
          rootDir: .
        jsonl:
          rootDir: .
    inference:
      groups:
        loopship_child_implementation:
          timeoutMs: 1200000
          "true":
            - unavailable
            - timeout
            - transport_error
            - invalid_json
            - invalid_output
            - abstain
          try:
            - llm.cli.codex.gpt-5.4-mini.max
            - aitl.subagent
        loopship_failure_repair:
          timeoutMs: 600000
          "true":
            - unavailable
            - timeout
            - transport_error
            - invalid_json
            - invalid_output
            - abstain
          try:
            - aitl.subagent
input:
  schema:
    document:
      type: object
      additionalProperties: true
do:
  - read_tasks:
      metadata:
        description: "Read the current Loopship task document through Fastflow workflow data."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.data.document.read
      with:
        body:
          namespace: .loopship/runtime
          adapter_config:
            rootDir: .
          adapter: yaml
          document: tasks
      output:
        schema:
          document:
            type:
              - object
              - "null"
            additionalProperties: true
        as: "${action.document}"
  - query_events:
      metadata:
        description: "Query the Loopship event log through Fastflow workflow data."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      call: fastflow.afn.data.event-log.query
      with:
        body:
          namespace: .loopship/runtime
          adapter_config:
            rootDir: .
          adapter: jsonl
          log: events
          limit: 25
      output:
        schema:
          document:
            type: array
            items:
              type: object
              additionalProperties: true
        as: "${action.events}"
  - resolve_stage:
      metadata:
        description: "Resolve the active Loopship flow stage from Fastflow workflow-data state."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      set:
        schema_version: loopship.flow-stage/v1
        flow_id: swe
        default_stage: planning
        current_stage: "${[\"planning\", \"awaiting_user_answers\", \"plan_review\", \"task_graph_ready\", \"executing\", \"validating\", \"verification_pending\", \"system_update_pending\", \"landing_ready\", \"replanning\", \"archived\"].includes(String(args.stage || args.state || state.steps.read_tasks?.action?.stage || \"planning\").trim()) ? String(args.stage || args.state || state.steps.read_tasks?.action?.stage || \"planning\").trim() : \"planning\"}"
        runtime:
          tasks: "${state.steps.read_tasks?.action || {}}"
          manifest: null
          events: "${state.steps.query_events?.action || []}"
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action.values}"
  - route_stage:
      metadata:
        description: "Route directly to the active Loopship flow stage."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
      switch:
        - planning_terminal_child:
            when: "${state.steps.resolve_stage.action.current_stage === \"planning\" && (String(state.steps.read_tasks.action.parent_wtree || \"\").trim() || String(state.steps.read_tasks.action.parent_task_id || \"\").trim() || String(state.steps.read_tasks.action.parent_context_ref || \"\").trim() || String(state.steps.read_tasks.action.prompt || \"\").replace(/^loopship:\\s*/i, \"\").trim().toLowerCase().startsWith(\"execute child task \")) && (!Array.isArray(state.steps.read_tasks.action.tasks) || state.steps.read_tasks.action.tasks.length === 0)}"
            then: stage_planning_terminal_child
        - planning:
            when: "${state.steps.resolve_stage.action.current_stage === \"planning\"}"
            then: stage_planning
        - awaiting_user_answers:
            when: "${state.steps.resolve_stage.action.current_stage === \"awaiting_user_answers\"}"
            then: stage_awaiting_user_answers
        - plan_review:
            when: "${state.steps.resolve_stage.action.current_stage === \"plan_review\"}"
            then: stage_plan_review
        - task_graph_ready_leaf:
            when: "${state.steps.resolve_stage.action.current_stage === \"task_graph_ready\" && (String(state.steps.read_tasks.action.parent_wtree || \"\").trim() || String(state.steps.read_tasks.action.parent_task_id || \"\").trim() || String(state.steps.read_tasks.action.parent_context_ref || \"\").trim() || String(state.steps.read_tasks.action.prompt || \"\").replace(/^loopship:\\s*/i, \"\").trim().toLowerCase().startsWith(\"execute child task \")) && Array.isArray(state.steps.read_tasks.action.tasks) && state.steps.read_tasks.action.tasks.length > 0 && state.steps.read_tasks.action.tasks.every((task) => !String((task || {}).child_wtree || \"\").trim())}"
            then: stage_leaf_git_head
        - task_graph_ready:
            when: "${state.steps.resolve_stage.action.current_stage === \"task_graph_ready\"}"
            then: stage_task_graph_ready
        - executing_leaf:
            when: "${state.steps.resolve_stage.action.current_stage === \"executing\" && Array.isArray(state.steps.read_tasks.action.tasks) && state.steps.read_tasks.action.tasks.length > 0 && state.steps.read_tasks.action.tasks.every((task) => !String((task || {}).child_wtree || \"\").trim())}"
            then: stage_leaf_git_head
        - executing:
            when: "${state.steps.resolve_stage.action.current_stage === \"executing\"}"
            then: stage_executing
        - validating:
            when: "${state.steps.resolve_stage.action.current_stage === \"validating\"}"
            then: stage_validating
        - verification_pending:
            when: "${state.steps.resolve_stage.action.current_stage === \"verification_pending\"}"
            then: stage_verification_pending
        - system_update_pending:
            when: "${state.steps.resolve_stage.action.current_stage === \"system_update_pending\"}"
            then: stage_system_update_pending
        - landing_ready:
            when: "${state.steps.resolve_stage.action.current_stage === \"landing_ready\"}"
            then: stage_landing_ready
        - replanning:
            when: "${state.steps.resolve_stage.action.current_stage === \"replanning\"}"
            then: stage_replanning
        - archived:
            when: "${state.steps.resolve_stage.action.current_stage === \"archived\"}"
            then: stage_archived
  - stage_planning_terminal_child:
      then: stage_result_planning
      metadata:
        description: "Build a deterministic local leaf plan for terminal child quests without invoking broad coordinator planning."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                call: loopship.afn.service.flow.compose-transition-result
                with:
                  body:
                    schema_version: loopship.stage-result.build/v1
                    flow_id: swe
                    stage_before: planning
                    stage_after: plan_review
                    transition: planned
                    step: plan
                    step_workflow_task: stage_planning_terminal_child
                    step_payload: {}
                    step_action: {}
                    state_patch:
                      stage: plan_review
                    events:
                      - event: terminal_child_planning_static_check
                    runtime: {}
                    as_check: true
      set:
        classification: terminal_child
        scope: "${String(state.steps.read_tasks.action.prompt || 'Execute assigned child task').replace(/^loopship:\\s*/i, '').trim() || 'Execute assigned child task'}"
        summary: "${String(state.steps.read_tasks.action.prompt || 'Execute assigned child task').replace(/^loopship:\\s*/i, '').trim() || 'Execute assigned child task'}"
        assumptions:
          - "Parent coordinator planning already defined the task boundary."
          - "The child quest must stay local and must not create nested child worktrees."
        constraints:
          - "Implement only the assigned parent task in the current child worktree."
          - "Do not edit Loopship runtime state directly."
          - "Land into the configured parent worktree and return the merge commit."
        defaulted_unknowns:
          - "Terminal child planning is derived from parent task metadata instead of re-asking product scope questions."
        high_impact_unknowns: []
        system_context:
          relevant_object_refs: []
          relevant_assertion_refs: []
          relevant_resource_refs:
            - "${String(state.steps.read_tasks.action.parent_context_ref || '').trim()}"
          relevant_memory_refs: []
          durable_implications:
            - kind: terminal_child
              statement: "This quest is a leaf worker for an already-planned parent task."
        verification_targets:
          - "Assigned child task has local commits in the child worktree before validation."
          - "Relevant tests, build, and documentation checks for the assigned task pass in the child worktree."
          - "Landing records the merge commit into the configured parent branch."
        decomposition_rationale: "Terminal child quests are already leaf assignments, so the smallest executable task graph is one local task."
        task_graph:
          tasks:
            - id: "${String(state.steps.read_tasks.action.parent_task_id || 'assigned-task').trim() || 'assigned-task'}"
              title: "${String(state.steps.read_tasks.action.prompt || 'Execute assigned child task').replace(/^loopship:\\s*/i, '').trim() || 'Execute assigned child task'}"
              type: coding
              status: pending
              dependencies:
                []
              scope_files:
                []
              spec_refs:
                []
              context_refs:
                - "${String(state.steps.read_tasks.action.parent_context_ref || '').trim()}"
              acceptance:
                - "Implement only the assigned parent task in the current child worktree."
                - "Run relevant local checks and record evidence before validation."
                - "Land into the configured parent branch and return the merge commit."
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action.values}"
  - stage_planning:
      then: stage_result_planning
      metadata:
        description: "Run Loopship planning via the pinned plan step workflow."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
        ref:
          digest: "sha256:aae338274e6ebd8fca7da1b41ec4c324a1822bbfc2bad08e99a6ce4372ea6185"
      call: loopship.workflow.service.step.plan
      with:
        version: 0.1.0
        input:
          schema_version: loopship.step.request/v1
          kind: quest_step_request
          wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          quest_id: "${state.steps.read_tasks.action.quest_id || state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          flow_id: swe
          flow_version: 1
          current_stage: planning
          summary: "Submit a decision-complete plan payload with explicit system context. Ask or default every high-impact unknown."
          prompt: "${state.steps.read_tasks.action.prompt || inputs.request || ''}"
          repo: "${state.steps.read_tasks.action.coordinator_worktree || inputs.repo || inputs.repoRoot || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          repoRoot: "${inputs.repoRoot || inputs.repo || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          runtime: "${inputs.runtime || ''}"
          tasks: "${Array.isArray(state.steps.read_tasks.action.tasks) ? state.steps.read_tasks.action.tasks : []}"
          question_rounds: "${Array.isArray(state.steps.read_tasks.action.question_rounds) ? state.steps.read_tasks.action.question_rounds : []}"
          plan_detail: "${state.steps.read_tasks.action.plan_detail || {}}"
          validation_receipt: "${state.steps.read_tasks.action.validation_receipt || {}}"
          verification_receipt: "${state.steps.read_tasks.action.verification_receipt || {}}"
          events: "${Array.isArray(state.steps.query_events.action) ? state.steps.query_events.action : []}"
          parent_wtree: "${state.steps.read_tasks.action.parent_wtree || ''}"
          parent_task_id: "${state.steps.read_tasks.action.parent_task_id || ''}"
          parent_context_ref: "${state.steps.read_tasks.action.parent_context_ref || ''}"
          coordinator_branch: "${state.steps.read_tasks.action.coordinator_branch || ''}"
          coordinator_worktree: "${state.steps.read_tasks.action.coordinator_worktree || ''}"
          landing_target_branch: "${state.steps.read_tasks.action.landing_target_branch || 'main'}"
          landing_target_worktree: "${state.steps.read_tasks.action.landing_target_worktree || ''}"
          replan_reason: "${state.steps.read_tasks.action.replan_reason || ''}"
          requirements:
            - "Classify the request."
            - "Use repository discovery before asking questions."
            - "Use AF to surface contradictions, hidden assumptions, weak evidence, and edge cases."
            - "Use OF to collapse scope, defaults, acceptance, decomposition, and verification targets."
            - "For greenfield app/product work, ask or explicitly default every high-impact unknown before task graph approval."
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - stage_awaiting_user_answers:
      then: stage_result_awaiting_user_answers
      metadata:
        description: "Run Loopship awaiting_user_answers via the pinned questions step workflow."
        validation:
          post:
            kind: static
            ok: true
            evidence:
              generated_by: loopship.fastflow
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: "The generated Loopship Fastflow-native step produced an action result."
              check:
                script:
                  kind: js
                  code: |
                    const ok = action !== undefined;
                    return { ok, evidence: { has_action: ok } };
        ref:
          digest: "sha256:41385edfdbfb3108d1fa90d9484834ed00ad28722b989eb8a3efe08cae8b8000"
      call: loopship.workflow.service.step.questions
      with:
        version: 0.1.0
        input:
          schema_version: loopship.step.request/v1
          kind: quest_step_request
          wtree: "${state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          quest_id: "${state.steps.read_tasks.action.quest_id || state.steps.read_tasks.action.wtree || inputs.wtree || ''}"
          flow_id: swe
          flow_version: 1
          current_stage: awaiting_user_answers
          summary: "Submit grouped user answers for the current clarification round."
          prompt: "${state.steps.read_tasks.action.prompt || inputs.request || ''}"
          repo: "${state.steps.read_tasks.action.coordinator_worktree || inputs.repo || inputs.repoRoot || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          repoRoot: "${inputs.repoRoot || inputs.repo || state.steps.read_tasks.action.context_root || env.PWD || ''}"
          runtime: "${inputs.runtime || ''}"
          tasks: "${Array.isArray(state.steps.read_tasks.action.tasks) ? state.steps.read_tasks.action.tasks : []}"
          question_rounds: "${Array.isArray(state.steps.read_tasks.action.question_rounds) ? state.steps.read_tasks.action.question_rounds : []}"
          plan_detail: "${state.steps.read_tasks.action.plan_detail || {}}"
          validation_receipt: "${state.steps.read_tasks.action.validation_receipt || {}}"
          verification_receipt: "${state.steps.read_tasks.action.verification_receipt || {}}"
          events: "${Array.isArray(state.steps.query_events.action) ? state.steps.query_events.action : []}"
          parent_wtree: "${state.steps.read_tasks.action.parent_wtree || ''}"
          coordinator_branch: "${state.steps.read_tasks.action.coordinator_branch || ''}"
          coordinator_worktree: "${state.steps.read_tasks.action.coordinator_worktree || ''}"
          landing_target_branch: "${state.steps.read_tasks.action.landing_target_branch || 'main'}"
          landing_target_worktree: "${state.steps.read_tasks.action.landing_target_worktree || ''}"
          requirements: []
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: "${action}"
  - stage_plan_review:
      then: stage_result_plan_review
