            const inputStepByStage = {"planning":"plan","awaiting_user_answers":"questions","plan_review":"task_graph","task_graph_ready":"executing","executing":"child_result","validating":"validation","verification_pending":"verification","system_update_pending":"system_update","landing_ready":"landing","replanning":"plan","archived":"archived"};
